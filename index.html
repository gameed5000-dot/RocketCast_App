<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Rocket Cast Control Panel</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a1a;
            color: #fff;
            font-family: Arial, sans-serif;
            padding: 20px;
            overflow-y: auto;
        }
        .container { max-width: 1200px; margin: 0 auto; }

        .tab-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #444;
        }
        .tab-btn {
            padding: 10px 20px;
            background: #333;
            color: #aaa;
            border: none;
            cursor: pointer;
            font-size: 14px;
            border-bottom: 3px solid transparent;
        }
        .tab-btn.active {
            color: #00d4ff;
            border-bottom-color: #00d4ff;
            background: #222;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .match-info {
            display: grid;
            grid-template-columns: 120px 1fr 250px;
            gap: 12px;
            margin-bottom: 20px;
        }
        .match-info input,
        .match-info select {
            padding: 10px;
            background: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
            font-size: 14px;
        }

        .control-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 30px;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-reset-series { background: #007bff; color: white; }
        .btn-switch { background: #20b2aa; color: white; }
        .btn-reset-data { background: #e91e63; color: white; }

        .teams-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .team-card {
            background: #222;
            border: 1px solid #444;
            padding: 20px;
            border-radius: 4px;
        }
        .team-card h3 { font-size: 18px; margin-bottom: 15px; text-align: center; }
        .team-field { margin-bottom: 15px; display: flex; gap: 10px; align-items: center; }
        .team-field label { font-size: 12px; color: #aaa; min-width: 80px; }
        .team-field input[type="text"],
        .team-field input[type="number"] {
            flex: 1;
            padding: 8px;
            background: #333;
            border: 1px solid #444;
            color: #fff;
            font-size: 14px;
        }

        .logo-section { margin-top: 15px; padding-top: 15px; border-top: 1px solid #444; }
        .logo-preview {
            width: 100%;
            height: 80px;
            background: #1a1a1a;
            border: 1px solid #444;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            border-radius: 4px;
            overflow: hidden;
        }
        .logo-preview img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .color-editor {
            background: #222;
            border: 1px solid #444;
            padding: 20px;
            border-radius: 4px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .color-control { display: flex; align-items: center; gap: 15px; }
        .color-control label { font-size: 14px; min-width: 100px; }
        .color-control input[type="color"] {
            width: 60px;
            height: 40px;
            border: 1px solid #444;
            cursor: pointer;
        }

        .stats-page { display: flex; flex-direction: column; gap: 16px; }
        .stats-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            background: #1f1f1f;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            padding: 12px 14px;
        }
        .stats-actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px;
        }
        .stats-card {
            background: linear-gradient(180deg, #262626, #202020);
            border: 1px solid #454545;
            border-radius: 6px;
            padding: 14px;
        }
        .stats-card h3 { margin: 0 0 8px 0; font-size: 14px; color: #fff; }
        .stats-kpi {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            padding: 4px 0;
            border-bottom: 1px solid #333;
        }
        .stats-kpi:last-child { border-bottom: none; }
        .stats-kpi strong { color: #00d4ff; }

        .stats-panel {
            background: #222;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 14px;
        }
        .stats-panel h3 {
            margin: 0 0 10px 0;
            font-size: 13px;
            color: #aaa;
            text-transform: uppercase;
        }

        .table-scroll {
            max-height: 360px;
            overflow: auto;
            border: 1px solid #333;
            border-radius: 6px;
        }

        .percent-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .percent-table th,
        .percent-table td {
            text-align: left;
            padding: 8px;
            border-bottom: 1px solid #333;
            vertical-align: middle;
        }
        .percent-table th {
            font-size: 11px;
            text-transform: uppercase;
            color: #888;
            position: sticky;
            top: 0;
            z-index: 1;
            background: #1f1f1f;
        }
        .percent-table tbody tr:nth-child(odd) {
            background: #202020;
        }
        .percent-table tbody tr:hover {
            background: #2b2b2b;
        }

        .bar-wrap {
            width: 100%;
            height: 8px;
            background: #1a1a1a;
            border-radius: 999px;
            overflow: hidden;
            border: 1px solid #333;
        }
        .bar {
            height: 100%;
            background: linear-gradient(90deg, #007bff, #00d4ff);
        }

        .talking-points {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 10px;
        }
        .point {
            background: #1d1d1d;
            border: 1px solid #3a3a3a;
            border-left: 3px solid #20b2aa;
            border-radius: 4px;
            padding: 10px 12px;
            font-size: 13px;
            color: #ddd;
            line-height: 1.45;
        }
        .point.fun {
            border-left-color: #f39c12;
            background: #242019;
            color: #ffe7bd;
        }

        .empty-state { color: #666; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="margin-bottom: 20px;">Rocket Cast</h1>

        <div class="tab-row">
            <button class="tab-btn active" data-tab="match-settings">Match Settings</button>
            <button class="tab-btn" data-tab="overlays">Overlays</button>
            <button class="tab-btn" data-tab="stats">Stats</button>
            <button class="tab-btn" data-tab="options">Options</button>
        </div>

        <div id="match-settings" class="tab-content active">
            <div class="match-info">
                <select id="series-length">
                    <option value="3">Best of 3</option>
                    <option value="5">Best of 5</option>
                    <option value="7" selected>Best of 7</option>
                </select>
                <input type="text" id="header-text" placeholder="Series text (optional)">
                <input type="text" id="header-text-full" placeholder="Extended series text (optional)">
            </div>

            <div class="control-buttons">
                <button class="btn btn-reset-series" id="reset-series-btn">RESET SERIES SCORE</button>
                <button class="btn btn-switch" id="switch-teams-btn">SWITCH TEAMS</button>
                <button class="btn btn-reset-data" id="reset-data-btn">RESET TEAM DATA</button>
            </div>

            <div class="teams-container">
                <div class="team-card">
                    <h3>LEFT/BLUE TEAM</h3>
                    <div class="team-field">
                        <label>Series score</label>
                        <input type="number" id="blue-wins" value="0" min="0" max="4">
                    </div>
                    <div class="logo-section">
                        <div class="logo-preview" id="blue-logo-preview"></div>
                        <div class="team-field">
                            <label>Logo</label>
                            <input type="file" id="blue-logo-file" accept="image/*">
                        </div>
                    </div>
                    <div class="team-field">
                        <label>Name</label>
                        <input type="text" id="blue-name" placeholder="Team name">
                    </div>
                    <div class="team-field">
                        <label>Abbrev</label>
                        <input type="text" id="blue-abbr" placeholder="e.g., BLU" maxlength="4">
                    </div>
                </div>

                <div class="team-card">
                    <h3>RIGHT/ORANGE TEAM</h3>
                    <div class="team-field">
                        <label>Series score</label>
                        <input type="number" id="orange-wins" value="0" min="0" max="4">
                    </div>
                    <div class="logo-section">
                        <div class="logo-preview" id="orange-logo-preview"></div>
                        <div class="team-field">
                            <label>Logo</label>
                            <input type="file" id="orange-logo-file" accept="image/*">
                        </div>
                    </div>
                    <div class="team-field">
                        <label>Name</label>
                        <input type="text" id="orange-name" placeholder="Team name">
                    </div>
                    <div class="team-field">
                        <label>Abbrev</label>
                        <input type="text" id="orange-abbr" placeholder="e.g., ORG" maxlength="4">
                    </div>
                </div>
            </div>

            <div class="color-editor">
                <div class="color-control">
                    <label>Blue Color</label>
                    <input type="color" id="blue-color" value="#21afd7">
                </div>
                <div class="color-control">
                    <label>Orange Color</label>
                    <input type="color" id="orange-color" value="#fd5b00">
                </div>
            </div>
        </div>

        <div id="overlays" class="tab-content">
            <h2 style="margin-bottom: 12px;">Available Overlays</h2>
            <div id="overlayList" style="display:flex;flex-direction:column;gap:10px;"></div>
        </div>

        <div id="stats" class="tab-content">
            <div class="stats-page">
                <div class="stats-header">
                    <div>
                        <h2 style="margin-bottom: 6px;">Caster Stats Hub</h2>
                        <div style="color:#999;font-size:12px;">Live team and player percentages for on-air analysis</div>
                    </div>
                    <div class="stats-actions">
                        <button class="btn" id="copy-stats-summary-btn" style="background:#20b2aa;color:white;width:auto;margin:0;">Copy Summary</button>
                        <button class="btn" id="copy-stats-table-btn" style="background:#007bff;color:white;width:auto;margin:0;">Copy Player Table</button>
                    </div>
                </div>

                <div id="stats-overview" class="stats-grid"></div>

                <div class="stats-panel">
                    <h3>Team Percentage Breakdown</h3>
                    <div id="team-percentages"></div>
                </div>

                <div class="stats-panel">
                    <h3>Player Percentage Table</h3>
                    <div id="player-percentages"></div>
                </div>

                <div class="stats-panel">
                    <h3>Caster Talking Points</h3>
                    <div id="caster-points" class="talking-points"></div>
                </div>
            </div>
        </div>

        <div id="options" class="tab-content">
            <h2>Options</h2>
            <p>Options content goes here</p>
        </div>
    </div>

    <script src="renderer.js"></script>
    <script>
        let liveGame = null;
        let lastGameStats = null;
        const panelSocket = io();

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));

            const selected = document.getElementById(tabName);
            if (selected) selected.classList.add('active');

            document.querySelectorAll('.tab-btn').forEach(btn => {
                if (btn.getAttribute('data-tab') === tabName) btn.classList.add('active');
            });
        }

        function showPanelToast(message, isError) {
            const toast = document.createElement('div');
            toast.textContent = message;
            toast.style.cssText = `position:fixed;bottom:20px;right:20px;background:${isError ? '#8B0000' : '#006400'};color:white;padding:12px 20px;border-radius:4px;font-size:12px;z-index:9999;`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2200);
        }

        function loadOverlays() {
            const container = document.getElementById('overlayList');
            if (!container) return;
            container.innerHTML = '';

            const overlays = [{ name: 'RLCS', path: 'RLCS' }, { name: 'CRL', path: 'CRL' }];
            overlays.forEach((overlay) => {
                const button = document.createElement('button');
                button.textContent = `Launch ${overlay.name} Overlay`;
                button.style.cssText = 'padding:12px 20px;background:#007bff;color:white;border:none;border-radius:4px;cursor:pointer;font-size:14px;';
                button.onclick = () => {
                    if (panelSocket && panelSocket.connected) {
                        panelSocket.emit('overlay-change', { overlayName: overlay.path });
                        showPanelToast(`Loading ${overlay.name} overlay on localhost:3000`, false);
                    } else {
                        showPanelToast('Not connected to relay', true);
                    }
                };
                container.appendChild(button);
            });
        }

        function pct(part, whole) {
            if (!whole || whole <= 0) return 0;
            return (part / whole) * 100;
        }

        function fmtPct(value) {
            return `${value.toFixed(1)}%`;
        }

        function getTeamName(teamNum) {
            if (teamNum === 0) return document.getElementById('blue-name').value.trim() || 'Blue';
            return document.getElementById('orange-name').value.trim() || 'Orange';
        }

        function computeStatsSnapshot() {
            if (!liveGame || !Array.isArray(liveGame.Players) || liveGame.Players.length === 0) return null;

            const players = liveGame.Players;
            const teams = liveGame.Game?.Teams || [];
            const byTeam = {
                0: players.filter(p => p.TeamNum === 0),
                1: players.filter(p => p.TeamNum === 1)
            };

            const teamStats = [0, 1].map(teamNum => {
                const list = byTeam[teamNum];
                const t = teams.find(x => x.TeamNum === teamNum) || {};
                const goals = Number.isFinite(Number(t.Score)) ? Number(t.Score) : list.reduce((s, p) => s + (p.Goals || 0), 0);
                const assists = list.reduce((s, p) => s + (p.Assists || 0), 0);
                const saves = list.reduce((s, p) => s + (p.Saves || 0), 0);
                const shots = list.reduce((s, p) => s + (p.Shots || 0), 0);
                const demos = list.reduce((s, p) => s + (p.Demos || 0), 0);
                const score = list.reduce((s, p) => s + (p.Score || 0), 0);
                return { teamNum, name: getTeamName(teamNum), goals, assists, saves, shots, demos, score };
            });

            const totals = {
                goals: teamStats[0].goals + teamStats[1].goals,
                assists: teamStats[0].assists + teamStats[1].assists,
                saves: teamStats[0].saves + teamStats[1].saves,
                shots: teamStats[0].shots + teamStats[1].shots,
                demos: teamStats[0].demos + teamStats[1].demos,
                score: teamStats[0].score + teamStats[1].score
            };

            const playerRows = players.map((p) => {
                const team = teamStats[p.TeamNum] || teamStats[0];
                return {
                    name: p.Name || 'Unknown',
                    teamName: team.name,
                    goals: p.Goals || 0,
                    assists: p.Assists || 0,
                    saves: p.Saves || 0,
                    shots: p.Shots || 0,
                    demos: p.Demos || 0,
                    score: p.Score || 0,
                    goalSharePct: pct(p.Goals || 0, team.goals),
                    assistSharePct: pct(p.Assists || 0, team.assists),
                    saveSharePct: pct(p.Saves || 0, team.saves),
                    shotSharePct: pct(p.Shots || 0, team.shots),
                    scoreSharePct: pct(p.Score || 0, team.score),
                    shootingPct: pct(p.Goals || 0, p.Shots || 0),
                    participationPct: pct((p.Goals || 0) + (p.Assists || 0), team.goals)
                };
            }).sort((a, b) => b.score - a.score);

            const leaders = {
                goals: [...playerRows].sort((a, b) => b.goals - a.goals)[0],
                assists: [...playerRows].sort((a, b) => b.assists - a.assists)[0],
                saves: [...playerRows].sort((a, b) => b.saves - a.saves)[0],
                demos: [...playerRows].sort((a, b) => b.demos - a.demos)[0],
                score: [...playerRows].sort((a, b) => b.score - a.score)[0],
                participation: [...playerRows].sort((a, b) => b.participationPct - a.participationPct)[0]
            };

            return { teamStats, totals, playerRows, leaders };
        }

        function selectFunPoints(pool, count, seed) {
            if (!Array.isArray(pool) || pool.length === 0) return [];
            const picked = [];
            const used = new Set();
            const safeSeed = Math.abs(seed || 0);
            let cursor = safeSeed % pool.length;

            while (picked.length < Math.min(count, pool.length)) {
                if (!used.has(cursor)) {
                    picked.push(pool[cursor]);
                    used.add(cursor);
                }
                cursor = (cursor + 7) % pool.length;
            }

            return picked;
        }

        function buildFunPointPool(ctx) {
            const pool = [];
            const add = (arr) => arr.forEach(line => pool.push(line));

            const blue = ctx.blue;
            const orange = ctx.orange;
            const leaders = ctx.leaders;
            const totalGoals = ctx.totalGoals;
            const totalShots = ctx.totalShots;
            const totalDemos = ctx.totalDemos;
            const shotDiff = ctx.shotDiff;
            const goalDiff = ctx.goalDiff;
            const shootingGap = ctx.shootingGap;
            const betterShootingTeam = ctx.betterShootingTeam;
            const higherShotTeam = ctx.higherShotTeam;
            const paceLabel = ctx.paceLabel;

            add([
                'Fun: Tonight is ' + paceLabel + ' Rocket League and the crowd can feel every touch.',
                'Fun: ' + totalShots + ' shots so far, both nets are getting peppered.',
                'Fun: ' + totalGoals + ' goals on the board and this lobby still wants more.',
                'Fun: This game has momentum swings every thirty seconds.',
                'Fun: Rotations are moving fast enough to need traffic lights.',
                'Fun: Every clear feels like it might turn into a highlight reel.',
                'Fun: This match is built for casters, nonstop action and storylines.',
                'Fun: You can feel the tension every time the ball hits the side wall.'
            ]);

            if (goalDiff === 0) {
                add([
                    'Fun: Dead even scoreboard, somebody blink and this game flips.',
                    'Fun: Tie game and every challenge looks like a game-winner setup.',
                    'Fun: Neither side is giving an inch, pure tug-of-war Rocket League.',
                    'Fun: It is level and the next kickoff could decide the whole vibe.',
                    'Fun: This is coin-flip territory, one bounce can settle it.',
                    'Fun: Equal score, maximum chaos potential.',
                    'Fun: This tie has overtime energy written all over it.',
                    'Fun: Both teams are mirroring each other punch for punch.'
                ]);
            }

            if (goalDiff >= 2) {
                const leaderName = blue.goals > orange.goals ? blue.name : orange.name;
                add([
                    'Fun: ' + leaderName + ' have built a ' + goalDiff + '-goal cushion and are surfing confidence.',
                    'Fun: ' + leaderName + ' are driving this game like they own the freeway.',
                    'Fun: ' + goalDiff + '-goal lead means ' + leaderName + ' can smell the finish line.',
                    'Fun: ' + leaderName + ' are forcing panic touches with this lead.',
                    'Fun: Scoreboard pressure is fully on the trailing side now.',
                    'Fun: The comeback clock is ticking for the team behind.',
                    'Fun: ' + leaderName + ' are in control mode and still pressing.',
                    'Fun: This lead is real, but Rocket League can flip in seconds.'
                ]);
            }

            if (totalGoals === 0) {
                add([
                    'Fun: Zero goals, all defense and nerves right now.',
                    'Fun: Goalkeepers are collecting paychecks tonight.',
                    'Fun: Scoreless so far, this is a patience test.',
                    'Fun: The nets have force fields up at the moment.',
                    'Fun: Still 0-0, every shot now feels twice as heavy.',
                    'Fun: This is a tactical chess match with rocket engines.',
                    'Fun: Neither team has cracked the code yet.',
                    'Fun: First goal in this one might break the dam.'
                ]);
            }

            if (shotDiff >= 4) {
                add([
                    'Fun: ' + higherShotTeam.name + ' are running a shooting clinic with +' + shotDiff + ' shots.',
                    'Fun: Shot volume says ' + higherShotTeam.name + ' are camping in attack mode.',
                    'Fun: ' + higherShotTeam.name + ' are knocking on the door over and over.',
                    'Fun: A ' + shotDiff + '-shot edge usually means the pressure meter is red.',
                    'Fun: ' + higherShotTeam.name + ' are making the opposing backboard work overtime.',
                    'Fun: This many extra shots means the defense is under constant stress.',
                    'Fun: ' + higherShotTeam.name + ' are winning the territory battle hard.',
                    'Fun: Shot advantage this big usually cashes in eventually.'
                ]);
            }

            if (shootingGap >= 6) {
                add([
                    'Fun: ' + betterShootingTeam.name + ' are turning chances into goals at a sharper rate.',
                    'Fun: Finishing edge belongs to ' + betterShootingTeam.name + ' by ' + fmtPct(shootingGap) + '.',
                    'Fun: Same game, different conversion quality.',
                    'Fun: ' + betterShootingTeam.name + ' are making their touches in front of net count.',
                    'Fun: This is the classic quality-over-quantity moment.',
                    'Fun: Clean striking from ' + betterShootingTeam.name + ' is shaping this game.',
                    'Fun: Shooting gap this size tells a story of composure.',
                    'Fun: One team is clinical, the other is still searching.'
                ]);
            }

            if ((leaders.assists?.assists || 0) >= 2) {
                add([
                    'Fun: ' + leaders.assists.name + ' is dealing assists like a point guard.',
                    'Fun: Playmaker alert, ' + leaders.assists.name + ' keeps finding perfect passes.',
                    'Fun: ' + leaders.assists.name + ' has the vision online tonight.',
                    'Fun: Passing lanes are wide open when ' + leaders.assists.name + ' touches the ball.',
                    'Fun: Teamwork spotlight on ' + leaders.assists.name + ' with ' + leaders.assists.assists + ' assists.',
                    'Fun: This is textbook setup play from ' + leaders.assists.name + '.',
                    'Fun: ' + leaders.assists.name + ' is basically running the offense script.',
                    'Fun: A creator in full flow is dangerous for any defense.'
                ]);
            }

            if ((leaders.saves?.saves || 0) >= 2) {
                add([
                    'Fun: ' + leaders.saves.name + ' is in full firefighter mode on defense.',
                    'Fun: Save counter climbing and ' + leaders.saves.name + ' keeps saying no.',
                    'Fun: The goal line belongs to ' + leaders.saves.name + ' right now.',
                    'Fun: ' + leaders.saves.saves + ' saves and counting, huge last-man work.',
                    'Fun: Defensive reactions from ' + leaders.saves.name + ' are lightning quick.',
                    'Fun: Every stop by ' + leaders.saves.name + ' keeps the game alive.',
                    'Fun: This is highlight-reel goalkeeping from ' + leaders.saves.name + '.',
                    'Fun: Big saves create big momentum swings, and ' + leaders.saves.name + ' has both.'
                ]);
            }

            if ((leaders.demos?.demos || 0) >= 2 || totalDemos >= 4) {
                add([
                    'Fun: Demo game is active, space is being created the hard way.',
                    'Fun: ' + leaders.demos.name + ' is driving like mirrors are optional.',
                    'Fun: Physical play is opening lanes all over this field.',
                    'Fun: ' + totalDemos + ' demos so far, nobody is safe near midfield.',
                    'Fun: Bump-and-boom strategy is alive and thriving.',
                    'Fun: Rotation discipline gets tested when demos pile up.',
                    'Fun: This is controlled chaos with demolitions as punctuation.',
                    'Fun: If you hear explosions, that is just map control being negotiated.'
                ]);
            }

            if ((leaders.participation?.participationPct || 0) >= 70) {
                add([
                    'Fun: ' + leaders.participation.name + ' is in almost every scoring sequence.',
                    'Fun: Participation near ' + fmtPct(leaders.participation.participationPct) + ' is star-level impact.',
                    'Fun: Offense keeps flowing through ' + leaders.participation.name + '.',
                    'Fun: If a goal happens, odds are ' + leaders.participation.name + ' touched the play.',
                    'Fun: This is a takeover performance in real time.',
                    'Fun: ' + leaders.participation.name + ' has fingerprints all over the scoreboard.',
                    'Fun: Heavy involvement like this usually swings series momentum.',
                    'Fun: One player is setting the tempo for everyone else.'
                ]);
            }

            if ((leaders.score?.score || 0) >= 500) {
                add([
                    'Fun: ' + leaders.score.name + ' is stacking score like it is double XP weekend.',
                    'Fun: ' + leaders.score.name + ' already crossed ' + leaders.score.score + ' score, huge workload.',
                    'Fun: Stat sheet is filling up quickly for ' + leaders.score.name + '.',
                    'Fun: Big score line means big influence in every phase.',
                    'Fun: ' + leaders.score.name + ' is touching every important play.',
                    'Fun: This is the kind of score total you feel in every challenge.',
                    'Fun: ' + leaders.score.name + ' is everywhere at once this game.',
                    'Fun: Monster score pace from ' + leaders.score.name + ' tonight.'
                ]);
            }

            if (totalShots >= 16) {
                add([
                    'Fun: This lobby turned into a shooting range in a hurry.',
                    'Fun: Shot counter is sprinting and both goalies are busy.',
                    'Fun: Pace is blazing, blink and you miss a chance.',
                    'Fun: End-to-end pressure, no time to breathe.',
                    'Fun: This game is all gas and very little brake.',
                    'Fun: Chance generation is through the roof right now.',
                    'Fun: Fast transitions are creating nonstop danger.',
                    'Fun: If you love offense, this is your game.'
                ]);
            }

            if (totalShots <= 8) {
                add([
                    'Fun: Low-shot game, every attempt is premium content.',
                    'Fun: Chances are rare, conversion value is sky high.',
                    'Fun: This one is tactical and patient, no freebies.',
                    'Fun: Tight neutral game, both teams protecting space first.',
                    'Fun: One clean passing sequence can break this open.',
                    'Fun: Defensive structure is winning over chaos here.',
                    'Fun: No panic touches, just measured decision making.',
                    'Fun: Compact game state, little room for mistakes.'
                ]);
            }

            return pool;
        }

        function renderStatsHub() {
            const snapshot = computeStatsSnapshot();
            lastGameStats = snapshot;

            const overview = document.getElementById('stats-overview');
            const teamEl = document.getElementById('team-percentages');
            const playerEl = document.getElementById('player-percentages');
            const pointsEl = document.getElementById('caster-points');

            if (!snapshot) {
                overview.innerHTML = '<div class="stats-card"><div class="empty-state">Waiting for live match data...</div></div>';
                teamEl.innerHTML = '<div class="empty-state">No team stats yet.</div>';
                playerEl.innerHTML = '<div class="empty-state">No player stats yet.</div>';
                pointsEl.innerHTML = '<div class="point">Start a match to generate caster talking points.</div>';
                return;
            }

            const leaders = snapshot.leaders;
            const totals = snapshot.totals;
            overview.innerHTML = `
                <div class="stats-card">
                    <h3>Top Scorer</h3>
                    <div class="stats-kpi"><span>Player</span><strong>${leaders.goals?.name || 'N/A'}</strong></div>
                    <div class="stats-kpi"><span>Goals</span><strong>${leaders.goals?.goals || 0}</strong></div>
                    <div class="stats-kpi"><span>Goal Share</span><strong>${leaders.goals ? fmtPct(leaders.goals.goalSharePct) : '0.0%'}</strong></div>
                </div>
                <div class="stats-card">
                    <h3>Playmaker</h3>
                    <div class="stats-kpi"><span>Player</span><strong>${leaders.assists?.name || 'N/A'}</strong></div>
                    <div class="stats-kpi"><span>Assists</span><strong>${leaders.assists?.assists || 0}</strong></div>
                    <div class="stats-kpi"><span>Participation</span><strong>${leaders.participation ? fmtPct(leaders.participation.participationPct) : '0.0%'}</strong></div>
                </div>
                <div class="stats-card">
                    <h3>Defense</h3>
                    <div class="stats-kpi"><span>Player</span><strong>${leaders.saves?.name || 'N/A'}</strong></div>
                    <div class="stats-kpi"><span>Saves</span><strong>${leaders.saves?.saves || 0}</strong></div>
                    <div class="stats-kpi"><span>Total Saves</span><strong>${totals.saves}</strong></div>
                </div>
                <div class="stats-card">
                    <h3>Physical Play</h3>
                    <div class="stats-kpi"><span>Demo Leader</span><strong>${leaders.demos?.name || 'N/A'}</strong></div>
                    <div class="stats-kpi"><span>Demos</span><strong>${leaders.demos?.demos || 0}</strong></div>
                    <div class="stats-kpi"><span>Total Demos</span><strong>${totals.demos}</strong></div>
                </div>
            `;

            const metrics = [
                ['Goals', 'goals'], ['Shots', 'shots'], ['Assists', 'assists'], ['Saves', 'saves'], ['Demos', 'demos'], ['Score', 'score']
            ];
            let teamHtml = '<table class="percent-table"><thead><tr><th>Metric</th><th>' + snapshot.teamStats[0].name + '</th><th>Blue Share</th><th>' + snapshot.teamStats[1].name + '</th><th>Orange Share</th></tr></thead><tbody>';
            metrics.forEach(([label, key]) => {
                const b = snapshot.teamStats[0][key] || 0;
                const o = snapshot.teamStats[1][key] || 0;
                const t = snapshot.totals[key] || 0;
                const bp = pct(b, t);
                const op = pct(o, t);
                teamHtml += '<tr><td>' + label + '</td><td>' + b + '</td><td>' + fmtPct(bp) + '<div class="bar-wrap"><div class="bar" style="width:' + Math.min(bp, 100).toFixed(1) + '%"></div></div></td><td>' + o + '</td><td>' + fmtPct(op) + '<div class="bar-wrap"><div class="bar" style="width:' + Math.min(op, 100).toFixed(1) + '%"></div></div></td></tr>';
            });
            teamHtml += '</tbody></table>';
            teamEl.innerHTML = '<div class="table-scroll">' + teamHtml + '</div>';

            const rows = snapshot.playerRows.map(p => '<tr><td>' + p.name + '</td><td>' + p.teamName + '</td><td>' + fmtPct(p.goalSharePct) + '</td><td>' + fmtPct(p.assistSharePct) + '</td><td>' + fmtPct(p.saveSharePct) + '</td><td>' + fmtPct(p.shotSharePct) + '</td><td>' + fmtPct(p.scoreSharePct) + '</td><td>' + fmtPct(p.shootingPct) + '</td><td>' + fmtPct(p.participationPct) + '</td></tr>').join('');
            playerEl.innerHTML = '<div class="table-scroll"><table class="percent-table"><thead><tr><th>Player</th><th>Team</th><th>Goal Share</th><th>Assist Share</th><th>Save Share</th><th>Shot Share</th><th>Score Share</th><th>Shooting %</th><th>Participation %</th></tr></thead><tbody>' + rows + '</tbody></table></div>';

            const blue = snapshot.teamStats[0];
            const orange = snapshot.teamStats[1];
            const shotDiff = Math.abs(blue.shots - orange.shots);
            const shootingGap = Math.abs(pct(blue.goals, blue.shots) - pct(orange.goals, orange.shots));
            const points = [];
            const totalGoals = blue.goals + orange.goals;
            const totalShots = blue.shots + orange.shots;
            const paceLabel = totalShots >= 20 ? 'high-octane' : (totalShots >= 12 ? 'steady pressure' : 'chess-match');
            const goalDiff = Math.abs(blue.goals - orange.goals);
            const higherShotTeam = blue.shots > orange.shots ? blue : orange;
            const higherShotPctTeam = pct(blue.goals, blue.shots) > pct(orange.goals, orange.shots) ? blue : orange;

            points.push((leaders.score?.name || 'A player') + ' leads the lobby with ' + (leaders.score?.score || 0) + ' score.');
            points.push((leaders.participation?.name || 'A player') + ' has ' + fmtPct(leaders.participation?.participationPct || 0) + ' goal participation.');
            points.push('Game profile right now: ' + paceLabel + ' with ' + totalShots + ' total shots and ' + totalGoals + ' total goals.');
            points.push('Shot conversion split: ' + blue.name + ' ' + fmtPct(pct(blue.goals, blue.shots)) + ' vs ' + orange.name + ' ' + fmtPct(pct(orange.goals, orange.shots)) + '.');
            if (shotDiff >= 3) points.push(higherShotTeam.name + ' have the pressure edge with a ' + shotDiff + '-shot advantage.');
            if (shootingGap >= 6) points.push(higherShotPctTeam.name + ' are finishing cleaner by ' + fmtPct(shootingGap) + '.');
            if ((leaders.assists?.assists || 0) >= 2) points.push((leaders.assists?.name || 'A player') + ' is the engine with ' + (leaders.assists?.assists || 0) + ' assists.');
            if ((leaders.demos?.demos || 0) >= 2) points.push((leaders.demos?.name || 'A player') + ' is setting the tone physically with ' + (leaders.demos?.demos || 0) + ' demos.');
            if ((leaders.saves?.saves || 0) >= 2) points.push((leaders.saves?.name || 'A defender') + ' is keeping this game alive with ' + (leaders.saves?.saves || 0) + ' saves.');
            if (goalDiff >= 2) points.push('Scoreline alert: ' + (blue.goals > orange.goals ? blue.name : orange.name) + ' lead by ' + goalDiff + ' goals.');

            const funPool = buildFunPointPool({
                blue,
                orange,
                leaders,
                totalGoals,
                totalShots,
                totalDemos: totals.demos,
                shotDiff,
                goalDiff,
                shootingGap,
                betterShootingTeam: higherShotPctTeam,
                higherShotTeam,
                paceLabel
            });

            const funSeed = Math.round(totalGoals * 31 + totalShots * 17 + totals.demos * 13 + goalDiff * 7 + shotDiff * 5 + (leaders.score?.score || 0));
            const selectedFun = selectFunPoints(funPool, 6, funSeed);
            const analyticHtml = points.map(t => '<div class="point">' + t + '</div>').join('');
            const funHtml = selectedFun.map(t => '<div class="point fun">' + t + '</div>').join('');
            pointsEl.innerHTML = analyticHtml + funHtml;
        }

        function buildSummaryText(snapshot) {
            if (!snapshot) return 'No live game stats available yet.';
            const b = snapshot.teamStats[0];
            const o = snapshot.teamStats[1];
            return [
                '=== CASTER STATS SUMMARY ===',
                `${b.name}: ${b.goals} goals, ${b.shots} shots, ${fmtPct(pct(b.goals, b.shots))} shooting`,
                `${o.name}: ${o.goals} goals, ${o.shots} shots, ${fmtPct(pct(o.goals, o.shots))} shooting`
            ].join('\n');
        }

        function buildPlayerTableText(snapshot) {
            if (!snapshot || snapshot.playerRows.length === 0) return 'No player percentage table available yet.';
            const header = 'Player | Team | GoalShare | AssistShare | SaveShare | ShotShare | ScoreShare | Shooting% | Participation%';
            const rows = snapshot.playerRows.map(p => `${p.name} | ${p.teamName} | ${fmtPct(p.goalSharePct)} | ${fmtPct(p.assistSharePct)} | ${fmtPct(p.saveSharePct)} | ${fmtPct(p.shotSharePct)} | ${fmtPct(p.scoreSharePct)} | ${fmtPct(p.shootingPct)} | ${fmtPct(p.participationPct)}`);
            return [header, ...rows].join('\n');
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadOverlays();
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function() { switchTab(this.getAttribute('data-tab')); });
            });
            switchTab('match-settings');
            renderStatsHub();

            document.getElementById('copy-stats-summary-btn').addEventListener('click', () => {
                navigator.clipboard.writeText(buildSummaryText(lastGameStats)).then(() => showPanelToast('Stats summary copied', false)).catch(() => showPanelToast('Failed to copy summary', true));
            });
            document.getElementById('copy-stats-table-btn').addEventListener('click', () => {
                navigator.clipboard.writeText(buildPlayerTableText(lastGameStats)).then(() => showPanelToast('Player table copied', false)).catch(() => showPanelToast('Failed to copy table', true));
            });
        });

        panelSocket.on('state', packet => {
            const ev = packet.Event || packet.event || '';
            const data = packet.Data || packet.data || {};
            if (ev === 'UpdateState') {
                liveGame = data;
                renderStatsHub();
            }
            if (ev === 'MatchDestroyed') {
                liveGame = null;
                renderStatsHub();
            }
        });
    </script>
</body>
</html>
