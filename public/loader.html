<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Rocket Cast Overlay Loader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000;
        }
        #overlayContainer {
            width: 100%;
            height: 100%;
            position: relative;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>
    <div id="overlayContainer"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const container = document.getElementById("overlayContainer");
        let currentOverlay = null;

        // Check for overlay parameter in URL
        const urlParams = new URLSearchParams(window.location.search);
        const initialOverlay = urlParams.get('overlay');

        // Connect to Socket.IO server
        const socket = io();

        socket.on("connect", () => {
            console.log("✓ Connected to Rocket Cast relay");
        });

        socket.on("disconnect", () => {
            console.log("✗ Disconnected from relay");
        });

        // Listen for overlay change events
        socket.on("overlay-change", (data) => {
            console.log("📺 Loading overlay:", data.overlayName);
            loadOverlay(data.overlayName);
        });

        // Also listen for state updates (from Rocket League relay)
        socket.on("state", (packet) => {
            // You can use this to display live match data if needed
            console.log("🎮 State update:", packet);
        });

        function loadOverlay(overlayName) {
            if (overlayName === currentOverlay) {
                return; // Already loaded
            }

            currentOverlay = overlayName;
            container.innerHTML = `<iframe src="/${overlayName}"></iframe>`;
        }

        // Load initial overlay if provided in URL
        if (initialOverlay) {
            loadOverlay(initialOverlay);
        }
    </script>
</body>
</html>
