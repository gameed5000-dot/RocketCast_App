<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>RLCS Overlay</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    @font-face {
      font-family: 'Bourgeois';
      src: url('Bourgeois-UltraBoldItalic.ttf') format('truetype');
      font-weight: 900;
      font-style: italic;
    }
    @font-face {
      font-family: 'BourgeoisBold';
      src: url('Bourgeois-BoldItal.otf') format('opentype');
      font-weight: 700;
      font-style: italic;
    }
    @font-face {
      font-family: 'BourgeoisBoldRegular';
      src: url('Bourgeois-Bold.otf') format('opentype');
      font-weight: 700;
      font-style: normal;
    }

    :root { --pc-team-color: #21afd7; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: transparent;
      overflow: hidden;
      width: 1920px; height: 1080px;
      font-family: 'Bourgeois', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ══════════════════════════════════════════
       HUD
    ══════════════════════════════════════════ */
    #hud {
      position: absolute;
      top: 18px; left: 50%;
      transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center;
      opacity: 0; transition: opacity 0.5s ease;
    }
    #hud.visible { opacity: 1; }

    #hud-outer {
      width: 380px;
      transition: width 0.48s cubic-bezier(0.22, 1, 0.36, 1);
      border: 1.5px solid rgba(180,180,180,0.35);
      border-bottom: none;
      border-radius: 5px 5px 0 0;
      overflow: hidden;
      position: relative;
    }
    #hud-outer.expanded { width: 860px; }

    #hud-header {
      background: #111; height: 20px; width: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    #hud-header span {
      font-family: 'Bourgeois', sans-serif;
      font-size: 13px; font-style: italic;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: #aaa; white-space: nowrap;
    }

    #scoreboard {
      display: flex; align-items: stretch; height: 64px; width: 100%;
    }

    .name-slide {
      width: 0; height: 64px; flex-shrink: 0;
      overflow: hidden;
      transition: width 0.48s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .name-slide.open { width: 240px; }

    .name-slide-inner {
      width: 240px; height: 64px;
      display: flex; align-items: center; justify-content: center;
      padding: 0 16px; position: relative; overflow: hidden;
    }
    #blue-slide .name-slide-inner {
      border-radius: 6px 0 0 6px;
      background: #21afd7;
    }
    #orange-slide .name-slide-inner {
      border-radius: 0 6px 6px 0;
      background: #fd5b00;
    }
    .name-slide-inner::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 45%;
      background: none;
      pointer-events: none;
    }
    .slide-team-name {
      font-family: 'BourgeoisBold', sans-serif;
      font-weight: 700; font-style: italic;
      font-size: 32px;
      text-transform: uppercase; color: #fff;
      white-space: nowrap; text-align: center;
      position: relative; z-index: 1;
      transform: translateY(-4px);
    }

    #scoreboard-core {
      display: flex; align-items: stretch;
      height: 64px; flex-shrink: 0; width: 380px;
    }

    .logo-box {
      width: 64px; height: 64px; background: #000000;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      font-family: 'BourgeoisBoldRegular', sans-serif;
      font-weight: 700; font-style: normal;
      color: #fff;
      text-transform: uppercase; letter-spacing: 0.1em;
      text-align: center;
      line-height: 1;
    }
    .logo-placeholder {
      width: 36px; height: 36px; border-radius: 4px; background: #101114;
    }

    .score-cell {
      width: 72px; height: 64px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; position: relative; overflow: hidden;
    }
    .score-cell.blue   { background: #21afd7; }
    .score-cell.orange { background: #fd5b00; }

    .score-digit {
      font-family: 'Bourgeois', sans-serif;
      font-weight: 900; font-style: italic;
      font-size: 73px; color: #fff; line-height: 1;
      text-align: center; position: relative; z-index: 1;
      transform: translateY(-6px);
    }
    .score-digit.bump {
      animation: bump 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }

    #clock-block {
      width: 108px; height: 64px; background: #fff;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    #clock-block:has(#clock-time.ot) {
      background: #cc0000;
    }
    #clock-time {
      font-family: 'BourgeoisBold', sans-serif;
      font-weight: 700; font-style: italic;
      font-size: 50px; color: #111; line-height: 1;
      letter-spacing: -.02em; transform: translateY(-1px);
    }
    #clock-time.ot { font-size: 39px; transform: translateY(-1px); color: #fff; }

    #abbrev-bar {
      width: 380px; height: 18px; background: #000000;
      display: flex; align-items: center; position: relative;
      border: 1.5px solid rgba(180,180,180,0.35);
      border-top: none; border-radius: 0 0 5px 5px; flex-shrink: 0;
    }
    #blue-abbrev, #orange-abbrev {
      font-family: 'BourgeoisBold', sans-serif;
      font-weight: 700; font-style: italic;
      font-size: 10px; letter-spacing: 0.18em;
      text-transform: uppercase; color: #aaa;
      position: absolute; text-align: center;
    }
    #blue-abbrev   { left: 0; width: 64px; }
    #orange-abbrev { left: 316px; width: 64px; }

    #series-pips {
      position: absolute; left: 64px; right: 64px;
      display: flex; align-items: center; gap: 3px;
    }
    .pip {
      flex: 1; height: 8px; border-radius: 0;
      background: #555; transition: background 0.3s ease;
    }
    .pip.blue-win   { background: #21afd7; }
    .pip.orange-win { background: #fd5b00; }
    .pip.match-point { box-shadow: 0 0 0 1.5px #C9A84C; background: #3a3a2a; }
    .pip.match-point.blue-win   { background: #21afd7; box-shadow: 0 0 0 1.5px #C9A84C; }
    .pip.match-point.orange-win { background: #fd5b00; box-shadow: 0 0 0 1.5px #C9A84C; }

    /* ══════════════════════════════════════════
       NAMEPLATES
    ══════════════════════════════════════════ */
    .nameplate-col {
      position: absolute; top: 18px;
      display: flex; flex-direction: column; gap: 4px;
      opacity: 0; transition: opacity 0.5s ease 0.25s;
    }
    .nameplate-col.visible { opacity: 1; }
    #blue-col   { left: 0; }
    #orange-col { right: 0; }

    .nameplate {
      display: flex; align-items: stretch;
      height: 46px; position: relative; width: 320px;
    }
    #blue-col   .nameplate { flex-direction: row; }
    #orange-col .nameplate { flex-direction: row-reverse; }

    .np-accent { display: none; }

    .np-bg {
      flex: 1; height: 100%; background: #101114;
      display: flex; align-items: center; padding: 0 14px;
      position: relative; overflow: hidden;
    }
    .np-name {
      font-family: 'BourgeoisBold', sans-serif; font-weight: 700; font-style: italic;
      font-size: 27px; letter-spacing: 0.06em; text-transform: uppercase;
      color: #fff; flex: 1; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
      line-height: 1; text-align: left; transform: translateY(-2px);
    }
    .boost-track {
      position: absolute; bottom: 3px; left: 0; right: 3px;
      height: 5px; background: #000;
    }
    #orange-col .boost-track { left: 3px; right: 0; }
    .boost-fill {
      position: absolute; top: 0; bottom: 0; left: 0;
      width: 0%; background: #21afd7; transition: width 0.25s ease;
    }
    #orange-col .boost-fill { left: auto; right: 0; background: #fd5b00; }

    .boost-val {
      font-family: 'BourgeoisBold', sans-serif; font-weight: 700; font-style: italic;
      font-size: 27px; color: #fff; flex-shrink: 0;
      min-width: 36px; text-align: right;
      letter-spacing: 0.03em; padding-right: 10px; transform: translateY(-2px);
    }
    #orange-col .np-bg     { flex-direction: row-reverse; }
    #orange-col .boost-val { text-align: left; padding-right: 0; padding-left: 10px; }
    #orange-col .np-name   { text-align: right; }

    #blue-col   .nameplate.spectated .np-bg { background: #21afd7; }
    #orange-col .nameplate.spectated .np-bg { background: #fd5b00; }
    #blue-col   .nameplate.spectated .boost-fill,
    #orange-col .nameplate.spectated .boost-fill { background: #fff !important; }

    .np-demo-flash {
      position: absolute; inset: 0;
      background: rgba(220,30,30,0.15);
      pointer-events: none; opacity: 0; transition: opacity 0.2s;
    }
    .nameplate.demolished .np-demo-flash { opacity: 1; }
    .nameplate.demolished .np-name       { opacity: 0.35; }

    .np-event-ext {
      position: absolute; top: 0; bottom: 0; right: -84px;
      width: 84px; display: flex; align-items: center;
      pointer-events: none; opacity: 0; transition: opacity 0.35s ease;
      z-index: 6; overflow: visible;
    }
    #orange-col .np-event-ext { right: auto; left: -84px; }
    .np-event-ext.show { opacity: 1; }

    .np-event-grad {
      position: absolute; top: 0; bottom: 0; left: -100px; right: 0;
      background: linear-gradient(to right, transparent 0%, #21afd7 30%);
    }
    #orange-col .np-event-grad {
      left: 0; right: -100px;
      background: linear-gradient(to left, transparent 0%, #fd5b00 30%);
    }
    .np-event-icon {
      position: absolute; right: 4px; width: 42px; height: 42px;
      object-fit: contain; transition: right 0.2s ease, left 0.2s ease;
      filter: drop-shadow(0 0 6px rgba(255,255,255,0.9)) drop-shadow(0 0 12px rgba(255,255,255,0.5));
    }
    #orange-col .np-event-icon { right: auto; left: 4px; }
    .np-event-icon2 {
      position: absolute; right: 4px; width: 42px; height: 42px;
      object-fit: contain; opacity: 0; transition: opacity 0.2s ease;
      filter: drop-shadow(0 0 6px rgba(255,255,255,0.9)) drop-shadow(0 0 12px rgba(255,255,255,0.5));
    }
    #orange-col .np-event-icon2 { right: auto; left: 4px; }
    .striker-icon {
      filter: drop-shadow(0 0 6px rgba(255,255,255,0.9)) drop-shadow(0 0 12px rgba(255,255,255,0.5)) brightness(1.8) saturate(0.8) !important;
    }
    .np-event-ext.two-icons .np-event-icon  { right: 52px; }
    .np-event-ext.two-icons .np-event-icon2 { opacity: 1; }
    #orange-col .np-event-ext.two-icons .np-event-icon  { right: auto; left: 52px; }
    #orange-col .np-event-ext.two-icons .np-event-icon2 { right: auto; left: 4px; }
    .np-event-icon[src=""], .np-event-icon2[src=""] { display: none; }

    /* ══════════════════════════════════════════
       REPLAY LOWER-THIRD
    ══════════════════════════════════════════ */
    #goal-lower {
      position: absolute; inset: 0; pointer-events: none;
      opacity: 0; transition: opacity 0.28s ease;
    }
    #goal-lower.show { opacity: 1; transition: opacity 0.32s ease; }

    #replay-graphic {
      position: absolute; inset: 0;
      width: 100%; height: 100%; object-fit: fill; display: block;
    }
    #goal-lower-stats {
      position: absolute; bottom: 40px; left: 50%;
      transform: translateX(-50%) translateY(22px);
      display: flex; align-items: center; gap: 10px;
      white-space: nowrap; opacity: 0;
      transition: opacity 0.35s ease 0.22s, transform 0.35s cubic-bezier(0,0,0.2,1) 0.22s;
    }
    #goal-lower.show #goal-lower-stats {
      opacity: 1; transform: translateX(-50%) translateY(0);
    }
    #goal-lower:not(.show) #goal-lower-stats {
      opacity: 0; transform: translateX(-50%) translateY(22px);
      transition: opacity 0.15s ease 0s, transform 0.15s cubic-bezier(0.4,0,1,1) 0s;
    }
    #goal-lower-icon-left {
      width: 46px; height: 46px; object-fit: contain; flex-shrink: 0;
      filter: brightness(0) invert(1) sepia(1) saturate(4) hue-rotate(185deg) brightness(1.3)
              drop-shadow(0 0 3px rgba(100,160,255,0.5));
      transform: translateY(20px);
    }
    #goal-lower-name {
      font-family: 'BourgeoisBold', sans-serif; font-weight: 700; font-style: italic;
      font-size: 36px; letter-spacing: 0.07em; text-transform: uppercase;
      color: #afcfff; transform: translateY(20px); margin-right: 24px;
    }
    #goal-lower-speed-icon {
      width: 42px; height: 42px; object-fit: contain; flex-shrink: 0;
      filter: brightness(0) invert(1) sepia(1) saturate(4) hue-rotate(185deg) brightness(1.3)
              drop-shadow(0 0 3px rgba(100,160,255,0.5));
      transform: translateY(20px);
    }
    #goal-lower-speed {
      font-family: 'BourgeoisBold', sans-serif; font-weight: 700; font-style: italic;
      font-size: 36px; letter-spacing: 0.05em; color: #afcfff;
      transform: translateY(20px);
    }
    #goal-lower-speed .speed-unit {
      font-size: 15px; letter-spacing: 0.18em; opacity: 0.75; margin-left: 3px;
    }

    #goal-lower-assist-icon {
      width: 46px; height: 46px; object-fit: contain; flex-shrink: 0;
      filter: brightness(0) invert(1) sepia(1) saturate(4) hue-rotate(185deg) brightness(1.3)
              drop-shadow(0 0 3px rgba(100,160,255,0.5));
      transform: translateY(20px);
      margin-left: 24px;
    }
    #goal-lower-assist-name {
      font-family: 'BourgeoisBold', sans-serif; font-weight: 700; font-style: italic;
      font-size: 36px; letter-spacing: 0.07em; text-transform: uppercase;
      color: #afcfff; transform: translateY(20px);
    }

    /* ══════════════════════════════════════════
       PLAYER STAT CARD
    ══════════════════════════════════════════ */
    #player-card {
      position: absolute; bottom: 0; left: 0;
      display: flex; flex-direction: row; align-items: stretch;
      height: 52px; pointer-events: none;
      opacity: 0; transform: translateY(14px);
      transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.22,1,0.36,1);
    }
    #player-card.show { opacity: 1; transform: translateY(0); }

    #pc-left { display: flex; flex-direction: row; align-items: stretch; flex-shrink: 0; position: relative; }
    #pc-boost-box {
      display: flex; align-items: center; padding: 0 16px 0 14px;
      background: #21afd7; flex-shrink: 0; position: relative;
    }
    #pc-boost-val { display: none; }
    #pc-name {
      font-family: 'BourgeoisBold', sans-serif; font-weight: 700; font-style: italic;
      font-size: 27px; letter-spacing: 0.06em; text-transform: uppercase; color: #fff;
      white-space: nowrap; transform: translateY(-2px); position: relative; z-index: 1;
    }
    #pc-boost-fill-track {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 4px; background: rgba(0,0,0,0.3);
    }
    #pc-boost-fill-bar {
      position: absolute; top: 0; bottom: 0; left: 0;
      width: 0%; background: #fff; transition: width 0.25s ease;
    }
    #pc-name-box { display: none; }

    #pc-stats {
      background: #101114; display: flex; align-items: center;
      gap: 0; padding: 0 18px 0 14px;
      border-left: 1.5px solid rgba(255,255,255,0.07); position: relative;
    }
    #pc-stats::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0;
      height: 3px; background: var(--pc-team-color, #21afd7);
    }
    .pc-stat { display: flex; align-items: baseline; gap: 4px; padding: 0 12px; }
    .pc-stat + .pc-stat { border-left: 1px solid rgba(255,255,255,0.09); }
    .pc-stat-val {
      font-family: 'Bourgeois', sans-serif; font-weight: 900; font-style: italic;
      font-size: 26px; color: #fff; letter-spacing: 0.03em; transform: translateY(-2px);
    }
    .pc-stat-label {
      font-family: 'Bourgeois', sans-serif; font-weight: 900; font-style: italic;
      font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
      color: #888; transform: translateY(-1px);
    }

    #boost-wheel {
      position: absolute; bottom: 52px; right: 50px;
      width: 120px; height: 120px;
      pointer-events: none; opacity: 0; transform: translateY(14px) scale(3.2);
      transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.22,1,0.36,1);
      display: flex; align-items: center; justify-content: center;
    }
    #player-card.show ~ #boost-wheel { opacity: 1; transform: translateY(0) scale(3.2); }
    #boost-wheel-svg { filter: drop-shadow(0 0 8px rgba(0,0,0,0.5)); }
    #boost-wheel-text {
      position: absolute; font-family: 'BourgeoisBold', sans-serif;
      font-weight: 700; font-style: italic;
      font-size: 32px; color: #21afd7; letter-spacing: 0.03em;
      transform: translateY(-2px); transition: color 0.3s ease;
    }

    @keyframes bump {
      0%   { transform: scale(1)   translateY(-6px); }
      40%  { transform: scale(1.4) translateY(-6px); }
      100% { transform: scale(1)   translateY(-6px); }
    }

    /* ══════════════════════════════════════════
       WIN SCREEN
    ══════════════════════════════════════════ */
    #win-screen {
      position: absolute; inset: 0;
      width: 1920px; height: 1080px;
      pointer-events: none; z-index: 100;
      font-family: 'Bourgeois', sans-serif;
    }

    #ws-stage {
      width: 100%; height: 100%;
      background: #05070d;
      position: relative; overflow: hidden;
      opacity: 0;
      transition: opacity 0s;
    }
    #ws-stage.active { opacity: 1; }

    #ws-hex-canvas {
      position: absolute; inset: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 1;
    }
    #ws-hex-pulse {
      position: absolute; inset: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 2; opacity: 0;
    }
    #ws-fade-right {
      position: absolute; inset: 0; z-index: 3; pointer-events: none;
      background: linear-gradient(to right, transparent 30%, rgba(5,7,13,0.88) 65%, rgba(5,7,13,0.97) 100%);
      opacity: 0; transition: opacity 0.6s ease 0.1s;
    }
    #ws-stage.active #ws-fade-right { opacity: 1; }

    #ws-slab {
      position: absolute; top: 0; bottom: 0; left: 0; width: 62%;
      clip-path: polygon(0 0, 100% 0, 80% 100%, 0 100%);
      z-index: 4; opacity: 0; transform: translateX(-8%);
      transition: opacity 0.48s ease, transform 0.48s cubic-bezier(0.16,1,0.3,1);
    }
    #ws-stage.active #ws-slab { opacity: 1; transform: translateX(0); }
    #ws-slab::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(160deg, rgba(255,255,255,0.16) 0%, transparent 50%);
      pointer-events: none;
    }

    #ws-slashes { position: absolute; inset: 0; z-index: 5; pointer-events: none; opacity: 0; transition: opacity 0.4s ease 0.3s; }
    #ws-stage.active #ws-slashes { opacity: 1; }

    #ws-lines { position: absolute; inset: 0; z-index: 6; pointer-events: none; overflow: hidden; }
    .ws-hline {
      position: absolute; left: 0; right: 0;
      background: rgba(255,255,255,0);
      transform: scaleX(0); transform-origin: left;
    }
    .ws-hline.r { transform-origin: right; }
    #ws-stage.active .ws-hline   { animation: wsLineIn  0.52s cubic-bezier(0.16,1,0.3,1) forwards; }
    #ws-stage.active .ws-hline.r { animation: wsLineInR 0.52s cubic-bezier(0.16,1,0.3,1) forwards; }
    @keyframes wsLineIn  { to { transform: scaleX(1); background: var(--lc); } }
    @keyframes wsLineInR { to { transform: scaleX(1); background: var(--lc); } }

    #ws-logo-wrap {
      position: absolute; right: 4%; top: 50%;
      transform: translateY(-50%) scale(0.45);
      width: 280px; height: 280px;
      z-index: 7; opacity: 0;
      transition: opacity 0.55s ease 0.65s, transform 0.65s cubic-bezier(0.16,1,0.3,1) 0.65s;
      display: flex; align-items: center; justify-content: center;
    }
    #ws-stage.active #ws-logo-wrap { opacity: 1; transform: translateY(-50%) scale(1); }
    #ws-logo-img {
      width: 100%; height: 100%; object-fit: contain;
      filter: drop-shadow(0 0 24px rgba(255,255,255,0.15)) drop-shadow(0 0 60px var(--ws-team-glow, rgba(100,140,255,0.3)));
    }

    #ws-center {
      position: absolute; inset: 0; z-index: 8;
      display: flex; flex-direction: column;
      align-items: flex-start; justify-content: center;
      padding-left: 5%;
    }
    #ws-eyebrow {
      font-family: 'Bourgeois', sans-serif; font-style: italic; font-weight: 900;
      font-size: 28px; letter-spacing: 0.5em; text-transform: uppercase;
      color: rgba(255,255,255,0.45); opacity: 0; transform: translateX(-20px);
    }
    #ws-stage.active #ws-eyebrow { animation: wsSlideIn 0.45s cubic-bezier(0.16,1,0.3,1) 0.58s forwards; }

    #ws-team-name {
      font-family: 'Bourgeois', sans-serif; font-style: italic; font-weight: 900;
      font-size: 201.6px; line-height: 0.86;
      text-transform: uppercase; color: #fff;
      opacity: 0; transform: translateX(-30px);
      text-shadow: 0 2px 40px rgba(0,0,0,0.8); white-space: nowrap;
    }
    #ws-stage.active #ws-team-name { animation: wsSlideIn 0.6s cubic-bezier(0.16,1,0.3,1) 0.66s forwards; }

    #ws-win-row {
      display: flex; align-items: center; gap: 17px; margin-top: 12px;
      opacity: 0; transform: translateX(-20px);
    }
    #ws-stage.active #ws-win-row { animation: wsSlideIn 0.5s cubic-bezier(0.16,1,0.3,1) 0.84s forwards; }
    #ws-accent-bar { width: 67px; height: 8px; flex-shrink: 0; border-radius: 1px; }
    #ws-win-text {
      font-family: 'Bourgeois', sans-serif; font-style: italic; font-weight: 900;
      font-size: 28px; letter-spacing: 0.4em; text-transform: uppercase; color: rgba(255,255,255,0.7);
    }

    #ws-series-score {
      font-family: 'Bourgeois', sans-serif; font-style: italic; font-weight: 900;
      font-size: 61px; letter-spacing: 0.08em; color: rgba(255,255,255,0.25);
      margin-top: 8px; opacity: 0; transform: translateX(-20px);
    }
    #ws-stage.active #ws-series-score { animation: wsSlideIn 0.5s cubic-bezier(0.16,1,0.3,1) 1.0s forwards; }

    @keyframes wsSlideIn {
      from { opacity: 0; transform: translateX(-24px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    #ws-bottom-strip {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 7.5%; z-index: 8;
      display: flex; align-items: center; padding: 0 5%;
      opacity: 0; transition: opacity 0.4s ease 1.05s;
    }
    #ws-stage.active #ws-bottom-strip { opacity: 1; }

      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 1px; background: rgba(255,255,255,0.1);
    }
    #ws-event-text {
      font-family: 'Bourgeois', sans-serif; font-style: italic; font-weight: 900;
      font-size: 18px; letter-spacing: 0.48em; text-transform: uppercase; color: rgba(255,255,255,0.25);
    }

    #ws-flash { position: absolute; inset: 0; z-index: 20; background: #fff; opacity: 0; pointer-events: none; }
    #ws-flash.pop { animation: wsFlashPop 0.36s ease forwards; }
    @keyframes wsFlashPop { 0% { opacity: 0.85; } 100% { opacity: 0; } }

    #ws-stage.out #ws-slab        { opacity: 0; transform: translateX(-6%); transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.4,0,1,1); }
    #ws-stage.out #ws-fade-right  { opacity: 0; transition: opacity 0.35s ease; }
    #ws-stage.out #ws-slashes     { opacity: 0; transition: opacity 0.3s ease; }
    #ws-stage.out #ws-logo-wrap   { opacity: 0; transform: translateY(-50%) scale(0.55); transition: opacity 0.35s ease, transform 0.4s cubic-bezier(0.4,0,1,1); }
    #ws-stage.out #ws-bottom-strip { opacity: 0; transition: opacity 0.3s ease; }
    #ws-stage.out #ws-eyebrow,
    #ws-stage.out #ws-team-name,
    #ws-stage.out #ws-win-row,
    #ws-stage.out #ws-series-score { animation: wsFadeOut 0.32s ease forwards !important; }
    #ws-stage.out .ws-hline        { animation: wsLineOut 0.35s ease forwards !important; }
    @keyframes wsFadeOut { from { opacity: 1; transform: translateX(0);   } to { opacity: 0; transform: translateX(14px); } }
    @keyframes wsLineOut { from { transform: scaleX(1); } to { transform: scaleX(0); } }

    #status { display: none; }

    /* ══════════════════════════════════════════
       STATS WALL
    ══════════════════════════════════════════ */
    #stats-wall {
      position: absolute; inset: 0;
      width: 1920px; height: 1080px;
      z-index: 110;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.55s cubic-bezier(0.22,1,0.36,1);
      font-family: 'Bourgeois', sans-serif;
      background: #05070d;
      display: flex; flex-direction: column;
    }
    #stats-wall.show { opacity: 1; }

    #sw-bg-slashes {
      position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 0;
    }

    #sw-header {
      position: relative; z-index: 2;
      height: 110px;
      display: flex; align-items: stretch;
      flex-shrink: 0;
    }

    .sw-team-header {
      flex: 1; display: flex; align-items: center;
      padding: 0 36px; gap: 20px;
      position: relative; overflow: hidden;
    }
    .sw-team-header::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(160deg, rgba(255,255,255,0.13) 0%, transparent 55%);
      pointer-events: none;
    }
    #sw-blue-header {
      background: #21afd7;
      clip-path: polygon(0 0, 100% 0, 92% 100%, 0 100%);
    }
    #sw-orange-header {
      background: #fd5b00;
      clip-path: polygon(8% 0, 100% 0, 100% 100%, 0 100%);
      flex-direction: row-reverse;
      padding: 0 36px;
    }

    .sw-team-logo { width: 68px; height: 68px; object-fit: contain; flex-shrink: 0; filter: drop-shadow(0 2px 12px rgba(0,0,0,0.5)); }
    .sw-team-logo-placeholder { width: 68px; height: 68px; border-radius: 8px; background: rgba(255,255,255,0.1); flex-shrink: 0; }
    .sw-team-name-block { display: flex; flex-direction: column; gap: 2px; }
    .sw-team-label { display: none; }
    .sw-team-name  { font-size: 72px; font-weight: 900; font-style: italic; text-transform: uppercase; color: #fff; line-height: 1; text-shadow: 0 2px 16px rgba(0,0,0,0.5); white-space: nowrap; transform: translateY(-4px); }
    .sw-team-win   { font-size: 64px; font-weight: 900; font-style: italic; text-transform: uppercase; color: #fff; line-height: 1; text-shadow: 0 2px 16px rgba(0,0,0,0.5); white-space: nowrap; min-height: 1px; margin-left: auto; margin-right: 24px; }
    #sw-orange-header .sw-team-win { margin-left: 24px; margin-right: auto; }

    #sw-center-block {
      width: 260px; flex-shrink: 0;
      background: #fff;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      position: relative; z-index: 3; gap: 2px;
    }
    #sw-center-scores { display: flex; align-items: center; gap: 14px; }
    .sw-center-score  { font-size: 76px; font-weight: 900; font-style: italic; line-height: 1; transform: translateY(-4px); }
    .sw-center-score.blue   { color: #21afd7; }
    .sw-center-score.orange { color: #fd5b00; }
    .sw-center-dash   { font-size: 34px; font-weight: 900; color: #999; transform: translateY(-6px); }
    #sw-center-label  { font-size: 22px; letter-spacing: 0.22em; text-transform: uppercase; color: #999; font-style: italic; }
    #sw-game-label    { font-size: 14px; letter-spacing: 0.18em; text-transform: uppercase; color: #555; font-style: italic; }

    #sw-body { flex: 1; position: relative; z-index: 2; display: flex; align-items: stretch; }

    .sw-team-col { flex: 1; display: flex; flex-direction: column; }

    .sw-player-names { display: flex; height: 52px; border-bottom: 1px solid rgba(255,255,255,0.07); position: relative; }
    .sw-player-name-cell {
      flex: 1; display: flex; align-items: center; justify-content: center; position: relative;
      font-size: 28px; font-weight: 900; font-style: italic;
      letter-spacing: 0.1em; text-transform: uppercase; color: #fff;
      border-right: 1px solid rgba(255,255,255,0.06);
      padding: 0 8px; text-align: center; transform: translateY(10px);
    }
    .sw-player-name-cell::after {
      content: attr(data-mvp);
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 80px; font-weight: 900; font-style: italic;
      color: #FFD14D; opacity: 0.5; white-space: nowrap; z-index: -1;
    }
    .sw-player-name-cell:last-child { border-right: none; }

    .sw-stat-rows { flex: 1; display: flex; flex-direction: column; }
    .sw-stat-row  { flex: 1; display: flex; align-items: stretch; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .sw-stat-row:last-child { border-bottom: none; }

    .sw-stat-cell {
      flex: 1; display: flex; align-items: center; justify-content: center;
      font-size: 44px; font-weight: 900; font-style: italic;
      color: #fff; letter-spacing: 0.02em;
      border-right: 1px solid rgba(255,255,255,0.05); position: relative;
    }
    .sw-stat-cell:last-child { border-right: none; }
    .sw-stat-cell.leader { color: #FFD14D; }

    #sw-center-col {
      width: 260px; flex-shrink: 0;
      display: flex; flex-direction: column;
      border-left: 1px solid rgba(255,255,255,0.07);
      border-right: 1px solid rgba(255,255,255,0.07);
      position: relative; z-index: 3;
    }
    .sw-center-name-spacer {
      height: 52px; display: flex; align-items: center; justify-content: center;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase;
      color: rgba(255,255,255,0.2); font-style: italic;
    }
    .sw-center-stat-label {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      border-bottom: 1px solid rgba(255,255,255,0.05); gap: 6px;
    }
    .sw-center-stat-label:last-child { border-bottom: none; }
    .sw-center-stat-name { font-size: 17px; font-weight: 900; font-style: italic; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(255,255,255,0.55); }

    .sw-bar-wrap   { width: 120px; height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; display: flex; }
    .sw-bar-blue   { height: 100%; background: #21afd7; border-radius: 2px 0 0 2px; transition: width 0.6s cubic-bezier(0.22,1,0.36,1); }
    .sw-bar-orange { height: 100%; background: #fd5b00; border-radius: 0 2px 2px 0; transition: width 0.6s cubic-bezier(0.22,1,0.36,1); 

    #sw-orange-col .sw-stat-cell { border-right: none; border-left: 1px solid rgba(255,255,255,0.05); }
    #sw-orange-col .sw-stat-cell:first-child { border-left: none; }

    .sw-stat-row:nth-child(odd) { background: rgba(255,255,255,0.015); }
    #sw-center-col .sw-center-stat-label:nth-child(odd) { background: rgba(255,255,255,0.015); }

    #stats-wall.show .sw-stat-cell {
      animation: swCellIn 0.5s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes swCellIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- ══ HUD ══ -->

      <!-- 225° -->
      <line x1="29.3" y1="29.3" x2="25.8" y2="25.8" stroke="#000000" stroke-width="1.2" stroke-linecap="round"/>
      <!-- 247.5° -->

          <polygon points="1115,0 1130,0 786,1080 771,1080" fill="rgba(255,255,255,0.028)"/>

  <script>
    const $ = id => document.getElementById(id);

    let SERIES_LENGTH = 7;
    const SLIDE_WIDTH = 240;

    /* ══════════════════════════════════════════
       WIN MUSIC
    ══════════════════════════════════════════ */
    const WIN_SONGS = [
      {
        src: 'Fight For It - StreamBeats by Harris Heller - APLMate.com.mp3',
        startAt: 57
      },
      {
        src: 'We Have Destruction - StreamBeats by Harris Heller - APLMate.com.mp3',
        startAt: 48
      },
      {
        src: 'Sugar Free - StreamBeats by Harris Heller - APLMate.com.mp3',
        startAt: 40
      },
    ];

    let winAudio = null;

    function playWinSong() {
      if (winAudio) {
        winAudio.pause();
        winAudio = null;
      }
      const pick = WIN_SONGS[Math.floor(Math.random() * WIN_SONGS.length)];
      winAudio = new Audio(pick.src);
      winAudio.volume = 0.8;
      winAudio.currentTime = pick.startAt;
      winAudio.play().catch(e => console.warn('Win audio blocked by browser:', e));
    }

    function stopWinSong() {
      if (!winAudio) return;
      winAudio.pause();
      winAudio.currentTime = 0;
      winAudio = null;
    }

    /* ══════════════════════════════════════════
       HUD HELPERS
    ══════════════════════════════════════════ */
    function buildPips(len) {
      SERIES_LENGTH = len || SERIES_LENGTH;
      const container = $('series-pips');
      container.innerHTML = '';
      for (let i = 0; i < SERIES_LENGTH; i++) {
        const pip = document.createElement('div');
        pip.className = 'pip';
        if (i === Math.floor(SERIES_LENGTH / 2)) pip.classList.add('match-point');
        pip.dataset.index = i;
        container.appendChild(pip);
      }
    }
    buildPips(7);

    function updatePips(blueWins, orangeWins) {
      const pips = $('series-pips').querySelectorAll('.pip');
      const bc = OV.blueColor   || null;
      const oc = OV.orangeColor || null;
      pips.forEach((pip, i) => {
        pip.classList.remove('blue-win', 'orange-win');
        pip.style.background = '';
        if (i < blueWins) {
          pip.classList.add('blue-win');
          if (bc) pip.style.background = bc;
        } else if (i >= SERIES_LENGTH - orangeWins) {
          pip.classList.add('orange-win');
          if (oc) pip.style.background = oc;
        }
      });
    }

    function abbrev(name) {
      if (!name) return '???';
      const words = name.trim().split(/\s+/);
      if (words.length === 1) return name.slice(0, 4).toUpperCase();
      return words.slice(0, 3).map(w => w[0]).join('').toUpperCase();
    }

    function fmtTime(secs, ot) {
      if (ot) {
        const abs = Math.abs(secs);
        return '+' + Math.floor(abs / 60) + ':' + String(abs % 60).padStart(2, '0');
      }
      const s = Math.max(secs, 0);
      return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
    }

    function bump(el) {
      el.classList.remove('bump');
      void el.offsetWidth;
      el.classList.add('bump');
    }

    function slideNameFontSize(name) {
      const len = (name || '').length;
      if (len <=  4) return '50px';
      if (len <=  6) return '46px';
      if (len <=  8) return '44px';
      if (len <= 10) return '40px';
      if (len <= 14) return '34px';
      if (len <= 18) return '26px';
      return '19px';
    }

    function logoBoxFontSize(abbrev) {
      const len = (abbrev || '').length;
      if (len === 2) return '40px';
      if (len === 3) return '32px';
      if (len === 4) return '20px';
      return '28px';
    }

    let prevBlue = 0, prevOrange = 0;
    let slideOpen = false;
    let slideCloseTimeout = null;

    // ── FIX 1: rolling ball-speed history ──────────────────────────────────
    let lastBallSpeed = 0;
    let ballSpeedHistory = [];
    const BALL_SPEED_HISTORY_MAX = 5;
    // ───────────────────────────────────────────────────────────────────────

    let pendingGoalShow = false;

    // ── FIX 2: replay-active flag used to guard player card updates ─────────
    let isReplayActive = false;
    // ───────────────────────────────────────────────────────────────────────

    function closeSlides() {
      // Clear the timeout if it's still pending
      if (slideCloseTimeout) {
        clearTimeout(slideCloseTimeout);
        slideCloseTimeout = null;
      }
      $('blue-slide').classList.remove('open');
      $('orange-slide').classList.remove('open');
      $('hud-outer').classList.remove('expanded');
      slideOpen = false;
      updateHeaderText();
    }

    function applyUpdateState(data) {
      const game    = data.Game    || {};
      const teams   = game.Teams   || [];
      const players = data.Players || [];
      const targetName = (game.Target && game.Target.Name) ? game.Target.Name : '';

      // Store team names from game state
      teams.forEach(t => {
        if (t.TeamNum === 0) {
          gameBlueTeamName = t.Name || 'BLUE';
        } else if (t.TeamNum === 1) {
          gameOrangeTeamName = t.Name || 'ORANGE';
        }
      });

      $('hud').classList.add('visible');
      $('blue-col').classList.add('visible');
      $('orange-col').classList.add('visible');

      let blueWins = 0, orangeWins = 0;

      teams.forEach(t => {
        const isBlue      = t.TeamNum === 0;
        const scoreEl     = isBlue ? $('blue-score')      : $('orange-score');
        const abbrEl      = isBlue ? $('blue-abbrev')     : $('orange-abbrev');
        const slideNameEl = isBlue ? $('blue-slide-name') : $('orange-slide-name');
        const cellEl      = isBlue ? $('blue-score-cell') : $('orange-score-cell');
        const slideEl     = isBlue ? $('blue-slide')      : $('orange-slide');
        const prev        = isBlue ? prevBlue : prevOrange;
        const name        = t.Name || (isBlue ? 'BLUE' : 'ORANGE');

        slideNameEl.textContent    = (isBlue ? (OV.blueName   || name) : (OV.orangeName || name)).toUpperCase();
        slideNameEl.style.fontSize = slideNameFontSize(isBlue ? (OV.blueName || name) : (OV.orangeName || name));

        const wins = t.SeriesWins ?? t.MatchWins ?? 0;
        if (isBlue) blueWins = wins; else orangeWins = wins;

        const newScore = t.Score ?? 0;
        if (newScore !== prev) {
          bump(scoreEl);
          if (isBlue) prevBlue = newScore; else prevOrange = newScore;
        }
        scoreEl.textContent = newScore;
        scoreEl.style.fontSize = newScore >= 10 ? '63px' : '';

        if (!( isBlue ? OV.blueColor : OV.orangeColor ) && t.ColorPrimary) {
          const solidColor = isBlue ? '#21afd7' : '#fd5b00';
          cellEl.style.background = solidColor;
          slideEl.querySelector('.name-slide-inner').style.background = solidColor;
        }
      });

      // Update scoreboard abbreviations with game team names after processing teams
      const blueAbbr   = OV.blueAbbr   || abbrev(gameBlueTeamName);
      const orangeAbbr = OV.orangeAbbr || abbrev(gameOrangeTeamName);
      $('blue-abbrev').textContent   = blueAbbr;
      $('orange-abbrev').textContent = orangeAbbr;

      // Copy abbreviations to logo boxes if no image
      if (!$('blue-logo-box').querySelector('img.ov-logo')) {
        $('blue-logo-box').innerHTML = '';
        $('blue-logo-box').textContent = blueAbbr;
        $('blue-logo-box').style.fontSize = logoBoxFontSize(blueAbbr);
      }
      if (!$('orange-logo-box').querySelector('img.ov-logo')) {
        $('orange-logo-box').innerHTML = '';
        $('orange-logo-box').textContent = orangeAbbr;
        $('orange-logo-box').style.fontSize = logoBoxFontSize(orangeAbbr);
      }

      updatePips(
        OV.blueWins   != null ? OV.blueWins   : blueWins,
        OV.orangeWins != null ? OV.orangeWins : orangeWins
      );

      const ot = !!game.bOvertime;
      $('clock-time').textContent = fmtTime(game.TimeSeconds ?? 0, ot);
      $('clock-time').className   = ot ? 'ot' : '';

      const isReplay = !!game.bReplay;
      $('status').textContent = isReplay ? 'REPLAY' : (ot ? '● OVERTIME' : '● LIVE');

      // ── FIX 1: update speed history on every packet regardless of replay ──
      if (game.Ball && game.Ball.Speed != null) {
        const spd = game.Ball.Speed;
        if (spd > 0) {
          ballSpeedHistory.push(spd);
          if (ballSpeedHistory.length > BALL_SPEED_HISTORY_MAX)
            ballSpeedHistory.shift();
        }
        if (!isReplay) lastBallSpeed = spd;
      }
      // ─────────────────────────────────────────────────────────────────────

      // ── FIX 2: set the flag before renderCol so the guard works ──────────
      isReplayActive = isReplay;
      // ─────────────────────────────────────────────────────────────────────

      if (!wasReplayActive && isReplay) onReplayStart();
      if (wasReplayActive && !isReplay) onGoalReplayEnd();
      wasReplayActive = isReplay;

      if (pendingGoalShow) resolveGoalScorer(players, targetName);

      renderCol($('blue-col'),   players.filter(p => p.TeamNum === 0), targetName);
      renderCol($('orange-col'), players.filter(p => p.TeamNum === 1), targetName);

      swCaptureStats(players, prevBlue, prevOrange);
    }

    let goalScorerName = '';
    let goalScorerTeam = -1;
    let goalAssistName = '';
    let goalSpeedSnapshot = 0;
    let wasReplayActive = false;

    function showGoal(data) {
      // If slides are already open with a timer running, don't reset it
      if (slideOpen && slideCloseTimeout) {
        return;
      }
      
      // Reset assist for new goal
      goalAssistName = '';
      
      closeSlides();
      $('blue-slide').classList.add('open');
      $('orange-slide').classList.add('open');
      $('hud-outer').classList.add('expanded');
      slideOpen = true;
      updateHeaderText();
      
      // Close slides after 18 seconds from goal scored
      slideCloseTimeout = setTimeout(() => {
        $('blue-slide').classList.remove('open');
        $('orange-slide').classList.remove('open');
        $('hud-outer').classList.remove('expanded');
        slideOpen = false;
        updateHeaderText();
        slideCloseTimeout = null;
      }, 18000);

      // Pick best available speed from history
      const candidates = [Math.round(lastBallSpeed), ...ballSpeedHistory.map(Math.round)];
      goalSpeedSnapshot = candidates.find(v => v > 0) ?? 0;

      // Use the actual scorer from GoalScored event data
      if (data && data.PlayerName) {
        goalScorerName = data.PlayerName.toUpperCase();
        goalScorerTeam = data.PlayerTeam ?? -1;
        goalAssistName = (data.Assister) ? data.Assister.toUpperCase() : '';
        console.log('GoalScored data:', JSON.stringify(data));
        console.log('Scorer:', goalScorerName, 'Assister:', goalAssistName);
        pendingGoalShow = true;
      } else {
        goalScorerName = '';
        goalScorerTeam = -1;
        goalAssistName = '';
        pendingGoalShow = true;
      }
    }

    function resolveGoalScorer(players, targetName) {
      // This function is kept for compatibility but assist comes from GoalScored event now
      let scorer = null, scorerTeam = -1;
      
      players.forEach(p => {
        const prev = prevStats[p.Name];
        if (prev && (p.Goals ?? 0) > prev.goals) { 
          scorer = p.Name; 
          scorerTeam = p.TeamNum; 
        }
      });
      
      if (!scorer && targetName) {
        const tp = players.find(p => p.Name === targetName);
        if (tp) { 
          scorer = tp.Name; 
          scorerTeam = tp.TeamNum; 
        }
      }
      
      if (!scorer) return;
      pendingGoalShow = false;
      goalScorerName = scorer.toUpperCase();
      goalScorerTeam = scorerTeam;
    }

    function onReplayStart() {
      $('goal-lower-name').textContent = goalScorerName || '...';
      $('goal-lower-speed').innerHTML  = goalSpeedSnapshot + '<span class="speed-unit">KPH</span>';
      
      console.log('onReplayStart - goalAssistName:', goalAssistName, 'type:', typeof goalAssistName);
      // Show assist if there is one, hide if not
      if (goalAssistName) {
        console.log('Showing assist:', goalAssistName);
        $('goal-lower-assist-name').textContent = goalAssistName;
        $('goal-lower-assist-icon').style.display = 'block';
        $('goal-lower-assist-name').style.display = 'inline';
      } else {
        console.log('Hiding assist');
        $('goal-lower-assist-icon').style.display = 'none';
        $('goal-lower-assist-name').style.display = 'none';
      }
      
      $('goal-lower').classList.add('show');
      $('player-card').classList.remove('show');  // hide card when replay starts
    }

    function onGoalReplayEnd() {
      clearAllGoalBadges();
      pendingGoalShow = false;
      wasReplayActive = false;
      isReplayActive  = false;
      $('goal-lower').classList.remove('show');
      lastSpectatedName = '';
      $('goal-lower-assist-icon').style.display = 'none';
      $('goal-lower-assist-name').style.display = 'none';
    }

    const prevStats   = {};
    const timedTimers = {};
    const goalBadgeEls = new Set();

    function triggerBadge(el, iconFile, pinToReplay = false) {
      const ext      = el.querySelector('.np-event-ext');
      const grad     = el.querySelector('.np-event-grad');
      const icon1    = el.querySelector('.np-event-icon');
      const icon2    = el.querySelector('.np-event-icon2');
      const boostVal = el.querySelector('.boost-val');
      const isOrange = el.closest('#orange-col') !== null;
      const name     = el.dataset.pname;

      // Skip striker badge if goal is already pinned
      if (!pinToReplay && iconFile.toLowerCase().includes('striker') && goalBadgeEls.has(el)) {
        return;
      }

      const teamColor = isOrange ? (OV.orangeColor || '#fd5b00') : (OV.blueColor || '#21afd7');
      grad.style.background = isOrange
        ? `linear-gradient(to left, transparent 0%, ${teamColor} 30%)`
        : `linear-gradient(to right, transparent 0%, ${teamColor} 30%)`;

      const alreadyShowing = ext.classList.contains('show');
      if (alreadyShowing) {
        icon2.src = iconFile;
        icon2.classList.toggle('striker-icon', iconFile.toLowerCase().includes('striker'));
        ext.classList.add('two-icons');
      } else {
        icon1.src = iconFile;
        icon1.classList.toggle('striker-icon', iconFile.toLowerCase().includes('striker'));
        icon2.src = '';
        icon2.classList.remove('striker-icon');
        ext.classList.remove('two-icons');
        boostVal.style.opacity = '0';
        ext.classList.add('show');
      }

      if (pinToReplay) {
        goalBadgeEls.add(el);
      } else {
        clearTimeout(timedTimers[name]);
        timedTimers[name] = setTimeout(() => {
          if (!goalBadgeEls.has(el)) dismissBadge(el);
          else {
            icon2.src = '';
            icon2.classList.remove('striker-icon');
            ext.classList.remove('two-icons');
          }
        }, 5000);
      }
    }

    function dismissBadge(el) {
      const ext      = el.querySelector('.np-event-ext');
      const boostVal = el.querySelector('.boost-val');
      goalBadgeEls.delete(el);
      ext.classList.remove('show', 'two-icons');
      setTimeout(() => { boostVal.style.opacity = ''; }, 350);
    }

    function clearAllGoalBadges() {
      goalBadgeEls.forEach(el => dismissBadge(el));
      goalBadgeEls.clear();
    }

    let lastSpectatedName = '';

    function updateBoostWheel(boostPercent, teamColor) {
      const boost = Math.max(0, Math.min(100, boostPercent || 0));
      $('boost-wheel-text').textContent = Math.round(boost);
      $('boost-wheel-text').style.color = teamColor || '#21afd7';
      $('boost-wheel-arc').style.stroke = teamColor || '#21afd7';

      const radius = 46;
      const centerX = 62.5;
      const centerY = 62.5;
      
      // Start at 6 o'clock (bottom)
      const startAngleDeg = 90;
      const startAngleRad = startAngleDeg * Math.PI / 180;
      const startX = centerX + radius * Math.cos(startAngleRad);
      const startY = centerY + radius * Math.sin(startAngleRad);
      
      // End based on boost percentage: 0% at 6:00, 100% at 3:00 (270 degrees total)
      const endAngleDeg = 90 + (boost / 100) * 270;
      const endAngleRad = endAngleDeg * Math.PI / 180;
      const endX = centerX + radius * Math.cos(endAngleRad);
      const endY = centerY + radius * Math.sin(endAngleRad);
      
      // Determine if large-arc flag is needed
      const arcDelta = (boost / 100) * 270;
      const largeArc = arcDelta > 180 ? 1 : 0;
      
      const pathData = `M ${startX} ${startY} A ${radius} ${radius} 0 ${largeArc} 1 ${endX} ${endY}`;
      $('boost-wheel-arc').setAttribute('d', pathData);
      
      // Placeholder: full 270 degree arc
      const fullEndAngleDeg = 90 + 270;
      const fullEndAngleRad = fullEndAngleDeg * Math.PI / 180;
      const fullEndX = centerX + radius * Math.cos(fullEndAngleRad);
      const fullEndY = centerY + radius * Math.sin(fullEndAngleRad);
      const fullPathData = `M ${startX} ${startY} A ${radius} ${radius} 0 1 1 ${fullEndX} ${fullEndY}`;
      $('boost-wheel-placeholder').setAttribute('d', fullPathData);
    }

    // ── FIX 2: guard against showing the card during replays ─────────────────
    function updatePlayerCard(player, teamColor) {
      if (isReplayActive) return;
      const card = $('player-card');
      $('pc-name').textContent      = player.Name.toUpperCase();
      const boost = Math.round(player.Boost ?? 0);
      $('pc-boost-val').textContent  = boost;

      $('pc-goals').textContent      = player.Goals   ?? 0;
      $('pc-shots').textContent      = player.Shots   ?? 0;
      $('pc-assists').textContent    = player.Assists ?? 0;
      $('pc-saves').textContent      = player.Saves   ?? 0;
      $('pc-demos').textContent      = player.Demolitions ?? player.Demos ?? 0;
      const color = teamColor || '#21afd7';
      $('pc-boost-box').style.background = color;
      document.documentElement.style.setProperty('--pc-team-color', color);
      updateBoostWheel(boost, color);
      card.classList.add('show');
    }

    function hidePlayerCard() {

    function renderCol(col, players, target) {
      const existing = {};
      col.querySelectorAll('.nameplate[data-pname]').forEach(el => { existing[el.dataset.pname] = el; });
      const seen = new Set();
      players.forEach(p => {
        seen.add(p.Name);
        let el = existing[p.Name];
        if (!el) { el = buildNameplate(); el.dataset.pname = p.Name; col.appendChild(el); }
        el.querySelector('.np-name').textContent  = p.Name;
        const boost = Math.round(p.Boost ?? 0);
        el.querySelector('.boost-val').textContent = boost;
        const fill = el.querySelector('.boost-fill');
        if (fill) fill.style.width = boost + '%';
        el.classList.toggle('demolished', !!p.bDemolished);

        const cur  = { goals: p.Goals ?? 0, assists: p.Assists ?? 0, saves: p.Saves ?? 0, demos: p.Demolitions ?? p.Demos ?? 0, shots: p.Shots ?? 0 };
        if (prevStats[p.Name]) {
          const prev = prevStats[p.Name];
          if (cur.goals > prev.goals) triggerBadge(el, 'Goal_points_icon.webp', true);
          if (cur.saves > prev.saves) triggerBadge(el, 'Save_points_icon.webp');
          if (cur.demos > prev.demos) triggerBadge(el, 'Demolition_points_icon.webp');
          if (cur.shots > prev.shots) triggerBadge(el, 'Shot_on_Goal_points_icon (1).webp');
        }
        prevStats[p.Name] = cur;

        const isSpectated = !!(target && p.Name === target);
        el.classList.toggle('spectated', isSpectated);

        if (isSpectated) {
          const isOrange = p.TeamNum === 1;
          const teamColor = isOrange ? (OV.orangeColor || '#fd5b00') : (OV.blueColor || '#21afd7');
          updatePlayerCard(p, teamColor);  // guard is inside updatePlayerCard now
        }
      });
      Object.keys(existing).forEach(n => { if (!seen.has(n)) existing[n].remove(); });
    }

    const WS_LINE_DEFS = [
      {pct:17,   h:2, a:0.55, d:0.36, r:false},
      {pct:18.3, h:1, a:0.16, d:0.39, r:true },

    function wsBuildLines() {

    function wsDrawHexGrid(color) {
      const cvs = $('ws-hex-canvas');
      const W = cvs.offsetWidth || 1920;
      const H = cvs.offsetHeight || 1080;
      cvs.width = W; cvs.height = H;
      const ctx = cvs.getContext('2d');
      ctx.clearRect(0, 0, W, H);
      const R = 32, hh = R * Math.sqrt(3);
      const cols = Math.ceil(W / (R * 3)) + 2;
      const rows = Math.ceil(H / hh) + 2;
      for (let row = -1; row < rows; row++) {
        for (let col = -1; col < cols; col++) {
          const cx = col * R * 3 + (row % 2) * R * 1.5;
          const cy = row * hh;
          ctx.beginPath();
          for (let i = 0; i < 6; i++) {
            const a = Math.PI / 180 * (60 * i - 30);
            const px = cx + R * Math.cos(a), py = cy + R * Math.sin(a);
            i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
          }
          ctx.closePath();
          const fade = Math.max(0, 1 - (cx / (W * 0.85)));
          ctx.strokeStyle = color;
          ctx.globalAlpha = 0.055 + fade * 0.09;
          ctx.lineWidth = 0.7;
          ctx.stroke();
          if ((row * 3 + col) % 13 === 0) {
            ctx.globalAlpha = 0.035 + fade * 0.05;
            ctx.fillStyle = color;
            ctx.fill();
          }
        }
      }
      ctx.globalAlpha = 1;
    }

    function wsDrawHexPulse(color, t) {
      const cvs = $('ws-hex-pulse');
      const W = cvs.offsetWidth || 1920;
      const H = cvs.offsetHeight || 1080;
      if (cvs.width !== W || cvs.height !== H) { cvs.width = W; cvs.height = H; }
      const ctx = cvs.getContext('2d');
      ctx.clearRect(0, 0, W, H);
      const R = 32, hh = R * Math.sqrt(3);
      const cols = Math.ceil(W / (R * 3)) + 2;
      const rows = Math.ceil(H / hh) + 2;
      for (let row = -1; row < rows; row++) {
        for (let col = -1; col < cols; col++) {
          const cx = col * R * 3 + (row % 2) * R * 1.5;
          const cy = row * hh;
          const dist = Math.sqrt((cx - W * 0.3) ** 2 + (cy - H * 0.5) ** 2);
          const wave = Math.sin(dist * 0.018 - t * 1.8);
          const pulse = (wave + 1) * 0.5;
          const fade = Math.max(0, 1 - (cx / (W * 0.85)));
          const alpha = pulse * 0.07 * fade;
          if (alpha < 0.005) continue;
          ctx.beginPath();
          for (let i = 0; i < 6; i++) {
            const a = Math.PI / 180 * (60 * i - 30);
            const px = cx + R * Math.cos(a), py = cy + R * Math.sin(a);
            i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
          }
          ctx.closePath();
          ctx.fillStyle = color;
          ctx.globalAlpha = alpha;
          ctx.fill();
        }
      }
      ctx.globalAlpha = 1;
    }

    function wsStartPulse(color) {
      cancelAnimationFrame(wsPulseFrame);
      $('ws-hex-pulse').style.opacity = '1';
      function tick() {
        wsPulseT += 0.016;
        wsDrawHexPulse(color, wsPulseT);
        wsPulseFrame = requestAnimationFrame(tick);
      }
      tick();
    }

    function wsStopPulse() {
      cancelAnimationFrame(wsPulseFrame);
      wsPulseFrame = null;
      const cvs = $('ws-hex-pulse');
      if (cvs) cvs.style.opacity = '0';
    }

    function wsApplyWinner(isBlue, blueScore, orangeScore) {
      const name  = isBlue ? (OV.blueName   || gameBlueTeamName)   : (OV.orangeName || gameOrangeTeamName);
      const color = isBlue ? (OV.blueColor  || '#21afd7')     : (OV.orangeColor || '#fd5b00');
      const logo  = isBlue ? (OV.blueLogo   || '864-8645931_rocket-league-logo-transparent.png')            : (OV.orangeLogo  || '864-8645931_rocket-league-logo-transparent.png');

      const spIdx = name.indexOf(' ');
      $('ws-team-name').innerHTML = spIdx !== -1
        ? name.slice(0, spIdx) + '<br>' + name.slice(spIdx + 1)
        : name;

      $('ws-series-score').textContent = blueScore + ' \u2013 ' + orangeScore;

      $('ws-slab').style.background = color;
      $('ws-accent-bar').style.background = color;
      $('ws-logo-img').src = logo;
      $('ws-stage').style.setProperty('--ws-team-glow', color + '55');

      wsDrawHexGrid(color);
      wsBuildLines();
      return color;
    }

    function wsPlayIn(color) {
      if (wsState === 'in') return;
      wsState = 'in';
      const s = $('ws-stage');
      s.classList.remove('out');
      void s.offsetWidth;
      $('ws-flash').classList.remove('pop');
      void $('ws-flash').offsetWidth;
      $('ws-flash').classList.add('pop');
      s.classList.add('active');
      wsStartPulse(color);
      playWinSong();
      setTimeout(() => { if (wsState === 'in') wsState = 'showing'; }, 1400);
    }

    function wsPlayOut() {
      if (wsState !== 'showing') return;
      wsState = 'out';
      wsStopPulse();
      const s = $('ws-stage');
      s.classList.add('out');
      showStatsWall();
      setTimeout(() => {
        s.classList.remove('active', 'out');
        wsState = 'idle';
      }, 500);
    }

    /* ══════════════════════════════════════════
       MATCH LIFECYCLE
    ══════════════════════════════════════════ */
    function onMatchEnded() {
      $('status').textContent = 'FINAL';
      closeSlides();

      if (prevBlue !== prevOrange) {
        const winner = prevBlue > prevOrange ? 'blue' : 'orange';
        const winsNeeded = Math.ceil(SERIES_LENGTH / 2);
        if (!(winner === 'blue'   && (OV.blueWins   ?? 0) >= winsNeeded) &&
            !(winner === 'orange' && (OV.orangeWins ?? 0) >= winsNeeded)) {
          if (winner === 'blue')   OV.blueWins   = (OV.blueWins   ?? 0) + 1;
          else                     OV.orangeWins = (OV.orangeWins ?? 0) + 1;
          updatePips(OV.blueWins ?? 0, OV.orangeWins ?? 0);
          socket.emit('overrides', Object.assign({}, OV));
        }
      }

      if (prevBlue === prevOrange) return;
      const blueWon = prevBlue > prevOrange;
      const color = wsApplyWinner(blueWon, prevBlue, prevOrange);
      clearTimeout(wsAutoTimer);
      wsPlayIn(color);
      wsAutoTimer = setTimeout(() => wsPlayOut(), 7000);
    }

    function onMatchDestroyed() {
      closeSlides();
      prevBlue = 0; prevOrange = 0;
      Object.keys(prevStats).forEach(k => delete prevStats[k]);
      Object.keys(timedTimers).forEach(k => { clearTimeout(timedTimers[k]); delete timedTimers[k]; });
      clearAllGoalBadges();
      $('blue-score').textContent   = '0';
      $('orange-score').textContent = '0';
      $('clock-time').textContent   = '5:00';
      $('clock-time').className     = '';
      $('status').textContent       = 'Waiting';
      hidePlayerCard();
      $('goal-lower').classList.remove('show');
      clearTimeout(wsAutoTimer);
      stopWinSong();
      hideStatsWall();
      if (wsState === 'showing' || wsState === 'in') wsPlayOut();

      // ── FIX 1: reset speed tracking on match destroy ──────────────────────
      ballSpeedHistory = [];
      lastBallSpeed    = 0;
      // ─────────────────────────────────────────────────────────────────────

      // ── FIX 2: reset replay flag ──────────────────────────────────────────
      isReplayActive  = false;
      wasReplayActive = false;
      // ─────────────────────────────────────────────────────────────────────
    }

    /* ══════════════════════════════════════════
       SOCKET.IO
    ══════════════════════════════════════════ */
    const socket = io();
    socket.on('connect',    () => { 
      $('status').textContent = 'Connected';
      // Apply overrides immediately on connect to update abbreviations
      applyOverrides(OV);
    });
    socket.on('disconnect', () => { $('status').textContent = 'Disconnected'; });
    socket.on('state', packet => {
      const { Event: ev, Data: data } = packet;
      switch (ev) {
        case 'UpdateState':    applyUpdateState(data); break;
        case 'GoalScored':     showGoal(data);         break;
        case 'GoalReplayEnd':  onGoalReplayEnd();      break;
        case 'MatchEnded':     onMatchEnded();          break;
        case 'MatchDestroyed': onMatchDestroyed();      break;
        case 'MatchPaused':    $('status').textContent = 'PAUSED'; break;
        case 'MatchUnpaused':  $('status').textContent = '● LIVE'; break;
      }
    });

    /* ══════════════════════════════════════════
       OVERRIDES
    ══════════════════════════════════════════ */
    let OV = {};
    let gameBlueTeamName = 'BLUE';
    let gameOrangeTeamName = 'ORANGE';

    function updateHeaderText() {
      const isExpanded = $('hud-outer').classList.contains('expanded');
      const headerText = OV.headerText || '';
      const headerTextFull = OV.headerTextFull || '';
      
      let displayText = '';
      if (isExpanded && headerTextFull && headerText) {
        displayText = headerTextFull + ' ' + headerText;
      } else if (headerText) {
        displayText = headerText;
      } else if (headerTextFull) {
        displayText = headerTextFull;
      } else {
        displayText = 'Rocket League Championship Series';
      }
      
      $('hud-header-text').textContent = displayText;
    }

    function applyOverrides(o) {
      OV = o || {};

      const blueName = OV.blueName || gameBlueTeamName;
      const orangeName = OV.orangeName || gameOrangeTeamName;

      if (OV.blueName)   { $('blue-slide-name').textContent    = blueName.toUpperCase();   $('blue-slide-name').style.fontSize   = slideNameFontSize(blueName);   }
      if (OV.orangeName) { $('orange-slide-name').textContent  = orangeName.toUpperCase(); $('orange-slide-name').style.fontSize = slideNameFontSize(orangeName); }
      $('blue-abbrev').textContent   = OV.blueAbbr ? OV.blueAbbr.toUpperCase().slice(0,4) : abbrev(blueName);
      $('orange-abbrev').textContent = OV.orangeAbbr ? OV.orangeAbbr.toUpperCase().slice(0,4) : abbrev(orangeName);
      
      // Copy abbreviations to logo boxes if no image
      if (!$('blue-logo-box').querySelector('img.ov-logo')) {
        $('blue-logo-box').innerHTML = $('blue-abbrev').textContent;
      }
      if (!$('orange-logo-box').querySelector('img.ov-logo')) {
        $('orange-logo-box').innerHTML = $('orange-abbrev').textContent;
      }
      
      updateHeaderText();

      function grad(hex) {
        return hex;
      }
      if (OV.blueColor) {
        $('blue-score-cell').style.background = grad(OV.blueColor);
        $('blue-slide').querySelector('.name-slide-inner').style.background = grad(OV.blueColor);
        let bs = document.getElementById('blue-color-style');
        if (!bs) { bs = document.createElement('style'); bs.id = 'blue-color-style'; document.head.appendChild(bs); }
        bs.textContent = `#blue-col .boost-fill { background: ${OV.blueColor} !important; } #blue-col .nameplate.spectated .np-bg { background: ${OV.blueColor} !important; }`;
      }
      if (OV.orangeColor) {
        $('orange-score-cell').style.background = grad(OV.orangeColor);
        $('orange-slide').querySelector('.name-slide-inner').style.background = grad(OV.orangeColor);
        let os = document.getElementById('orange-color-style');
        if (!os) { os = document.createElement('style'); os.id = 'orange-color-style'; document.head.appendChild(os); }
        os.textContent = `#orange-col .boost-fill { background: ${OV.orangeColor} !important; } #orange-col .nameplate.spectated .np-bg { background: ${OV.orangeColor} !important; }`;
      }

      function setLogo(boxId, dataUrl, abbrevText) {
        const box = $(boxId);
        let img = box.querySelector('img.ov-logo');
        if (dataUrl) {
          if (!img) {
            img = document.createElement('img');
            img.className = 'ov-logo';
            img.style.cssText = 'width:44px;height:44px;object-fit:contain;';
            box.innerHTML = '';
            box.appendChild(img);
          }
          img.src = dataUrl;
        } else {
          // Show abbreviation instead
          box.innerHTML = `<div style="display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; font-size: 16px; font-weight: 900; color: #fff; font-family: 'Bourgeois', sans-serif; font-style: italic;">${abbrevText}</div>`;
        }
      }
      if (OV.blueLogo)   setLogo('blue-logo-box',   OV.blueLogo);
      else               setLogo('blue-logo-box',   null, OV.blueAbbr || abbrev(blueName));
      if (OV.orangeLogo) setLogo('orange-logo-box', OV.orangeLogo);
      else               setLogo('orange-logo-box', null, OV.orangeAbbr || abbrev(orangeName));

      // HUD always scales to 1.10x
      $('hud').style.transform       = `translateX(-50%) scale(1.10)`;
      $('hud').style.transformOrigin = 'top center';

      // Boost wheel always scales to 2x
      $('boost-wheel').style.transform = `translateY(0) scale(2)`;
      $('boost-wheel').style.transformOrigin = 'bottom right';

      if (OV.seriesLen != null) buildPips(OV.seriesLen);
      updatePips(OV.blueWins ?? 0, OV.orangeWins ?? 0);

      if (OV.showHud != null) $('hud').classList.toggle('visible', !!OV.showHud);
      if (OV.showNameplates != null) {
        $('blue-col').style.visibility   = OV.showNameplates ? '' : 'hidden';
        $('orange-col').style.visibility = OV.showNameplates ? '' : 'hidden';
      }
      if (OV.clearLogos) {
        ['blue-logo-box', 'orange-logo-box'].forEach(id => {
          $(id).innerHTML = '<div class="logo-placeholder"></div>';
        });
      }
    }

    /* ══════════════════════════════════════════
       STATS WALL
    ══════════════════════════════════════════ */
    let swSnapshot = { blue: [], orange: [], blueWins: 0, orangeWins: 0, blueGameScore: 0, orangeGameScore: 0 };

    function swCaptureStats(players, blueGameScore, orangeGameScore) {
      swSnapshot.blue        = players.filter(p => p.TeamNum === 0).map(p => ({ ...p }));
      swSnapshot.orange      = players.filter(p => p.TeamNum === 1).map(p => ({ ...p }));
      swSnapshot.blueGameScore   = blueGameScore;
      swSnapshot.orangeGameScore  = orangeGameScore;
    }

    const SW_STATS = [
      { key: 'Score',   get: p => p.Score        ?? 0 },
      { key: 'Goals',   get: p => p.Goals        ?? 0 },
      { key: 'Assists', get: p => p.Assists      ?? 0 },
      { key: 'Shots',   get: p => p.Shots        ?? 0 },
      { key: 'Saves',   get: p => p.Saves        ?? 0 },
      { key: 'Demos',   get: p => p.Demolitions  ?? p.Demos ?? 0 },
    ];
    const SW_BAR_KEYS = ['score','goals','assists','shots','saves','demos'];

    function swBuildCol(nameEl, rowsEl, players, isOrange, mvpName) {
      nameEl.innerHTML = '';
      players.forEach((p, idx) => {
        const cell = document.createElement('div');
        cell.className = 'sw-player-name-cell';
        if (p.Name === mvpName) {
          cell.setAttribute('data-mvp', 'MVP');
        }
        cell.textContent = p.Name;
        nameEl.appendChild(cell);
      });

      rowsEl.innerHTML = '';
      SW_STATS.forEach((stat, si) => {
        const row = document.createElement('div');
        row.className = 'sw-stat-row';
        const allVals = players.map(p => stat.get(p));
        const maxVal  = Math.max(...allVals, 1);

        players.forEach((p, pi) => {
          const val  = stat.get(p);
          const cell = document.createElement('div');
          cell.className = 'sw-stat-cell';
          cell.style.animationDelay = (0.08 + si * 0.06 + pi * 0.03) + 's';
          if (val === maxVal && val > 0) cell.classList.add('leader');
          cell.textContent = val;
          row.appendChild(cell);
        });
        rowsEl.appendChild(row);
      });
    }

    function swUpdateBars(bluePlayers, orangePlayers, blueColor, orangeColor) {
      SW_STATS.forEach((stat, si) => {
        const bKey   = SW_BAR_KEYS[si];
        const bTotal = bluePlayers.reduce((s, p) => s + stat.get(p), 0);
        const oTotal = orangePlayers.reduce((s, p) => s + stat.get(p), 0);
        const total  = bTotal + oTotal || 1;
        const bPct   = (bTotal / total * 100).toFixed(1);
        const oPct   = (oTotal / total * 100).toFixed(1);
        const bBar = document.getElementById('swbar-' + bKey + '-b');
        const oBar = document.getElementById('swbar-' + bKey + '-o');
        if (bBar) { bBar.style.width = bPct + '%'; bBar.style.background = blueColor; }
        if (oBar) { oBar.style.width = oPct + '%'; oBar.style.background = orangeColor; }
      });
    }

    function swTeamNameFontSize(name) {
      const len = name.length;
      if (len <= 4) return '72px';
      if (len <= 6) return '68px';
      if (len <= 8) return '62px';
      if (len <= 10) return '56px';
      if (len <= 12) return '50px';
      if (len <= 14) return '48px';
      return '48px';
    }

    function swPopulate() {
      const { blue, orange, blueGameScore, orangeGameScore } = swSnapshot;
      const finalBlueWins = OV.blueWins != null ? OV.blueWins : 0;
      const finalOrangeWins = OV.orangeWins != null ? OV.orangeWins : 0;

      const blueName   = OV.blueName   || gameBlueTeamName;
      const orangeName = OV.orangeName || gameOrangeTeamName;
      const blueNameUpper = blueName.toUpperCase();
      const orangeNameUpper = orangeName.toUpperCase();
      document.getElementById('sw-blue-name').textContent   = blueNameUpper;
      document.getElementById('sw-blue-name').style.fontSize = swTeamNameFontSize(blueNameUpper);
      document.getElementById('sw-orange-name').textContent = orangeNameUpper;
      document.getElementById('sw-orange-name').style.fontSize = swTeamNameFontSize(orangeNameUpper);
      document.getElementById('sw-blue-win').textContent   = blueGameScore > orangeGameScore ? 'WIN' : '';
      document.getElementById('sw-orange-win').textContent = orangeGameScore > blueGameScore ? 'WIN' : '';

      const bc = OV.blueColor   || '#21afd7';
      const oc = OV.orangeColor || '#fd5b00';
      document.getElementById('sw-blue-header').style.background   = bc;
      document.getElementById('sw-orange-header').style.background = oc;

      function setSwLogo(wrapId, dataUrl, abbrevText) {
        const wrap = document.getElementById(wrapId);
        if (dataUrl) {
          wrap.innerHTML = `<img class="sw-team-logo" src="${dataUrl}" alt="" />`;
          wrap.className = '';
        } else {
          wrap.innerHTML = `<span style="display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; font-size: 28px; font-weight: 900; color: #fff; font-family: 'Bourgeois', sans-serif;">${abbrevText}</span>`;
          wrap.className = 'sw-team-logo-placeholder';
        }
      }
      setSwLogo('sw-blue-logo-wrap',   OV.blueLogo   || null, OV.blueAbbr || abbrev(blueName));
      setSwLogo('sw-orange-logo-wrap', OV.orangeLogo || null, OV.orangeAbbr || abbrev(orangeName));

      document.getElementById('sw-score-blue').textContent   = finalBlueWins;
      document.getElementById('sw-score-orange').textContent = finalOrangeWins;
      document.getElementById('sw-score-blue').style.color   = bc;
      document.getElementById('sw-score-orange').style.color = oc;

      // Find overall MVP across both teams
      let mvpName = '';
      let maxScore = -1;
      [...blue, ...orange].forEach(p => {
        const score = p.Score ?? 0;
        if (score > maxScore) {
          maxScore = score;
          mvpName = p.Name;
        }
      });

      swBuildCol(
        document.getElementById('sw-blue-names'),
        document.getElementById('sw-blue-rows'),
        blue, false, mvpName
      );
      swBuildCol(
        document.getElementById('sw-orange-names'),
        document.getElementById('sw-orange-rows'),
        orange, true, mvpName
      );

      swUpdateBars(blue, orange, bc, oc);
    }

    function showStatsWall() {
      swPopulate();
      document.getElementById('stats-wall').classList.add('show');
      socket.emit('statsWallShown');
    }

    function hideStatsWall() {
      document.getElementById('stats-wall').classList.remove('show');
    }

    socket.on('overrides', data => applyOverrides(data));
    socket.on('dismissStats', () => hideStatsWall());
  </script>
</body>
</html>
